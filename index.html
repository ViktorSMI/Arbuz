//  WATERMELON WORLD CONQUEST — Engine

  CH = C.height = innerHeight;

// ── Polyfill ────────────────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
    r = Math.min(r,w/2,h/2);
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);this.closePath();
  };
}

// ============================================================
//  SOUND ENGINE (procedural synth + sequencer)
// ============================================================
const SE={
  ctx:null,mus:null,sfx:null,noiseBuf:null,
  playing:false,track:null,step:0,nextT:0,tid:null,
  init(){
    if(this.ctx) return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    const comp=this.ctx.createDynamicsCompressor();
    comp.threshold.value=-18; comp.ratio.value=6;
    comp.connect(this.ctx.destination);
    this.mus=this.ctx.createGain(); this.mus.gain.value=0.28; this.mus.connect(comp);
    this.sfx=this.ctx.createGain(); this.sfx.gain.value=0.45; this.sfx.connect(comp);
    const sr=this.ctx.sampleRate;
    this.noiseBuf=this.ctx.createBuffer(1,sr,sr);
    const d=this.noiseBuf.getChannelData(0);
    for(let i=0;i<sr;i++) d[i]=Math.random()*2-1;
  },
  nf(n){
    if(!n||n==='_') return 0;
    const S={C:0,Cs:1,Db:1,D:2,Ds:3,Eb:3,E:4,F:5,Fs:6,Gb:6,G:7,Gs:8,Ab:8,A:9,As:10,Bb:10,B:11};
    const m=n.match(/^([A-G][sb]?)(\d)$/);
    return m?440*Math.pow(2,(S[m[1]]-9)/12+(m[2]-4)):0;
  },
  tone(freq,time,dur,type,vol,cut){
    if(!freq||!this.ctx) return;
    const c=this.ctx,o=c.createOscillator(),f=c.createBiquadFilter(),g=c.createGain();
    o.type=type; o.frequency.value=freq;
    f.type='lowpass'; f.frequency.value=cut||3000; f.Q.value=1;
    g.gain.setValueAtTime(0.001,time);
    g.gain.linearRampToValueAtTime(vol||0.1,time+0.008);
    g.gain.setValueAtTime((vol||0.1)*0.7,time+dur*0.6);
    g.gain.exponentialRampToValueAtTime(0.001,time+dur);
    o.connect(f); f.connect(g); g.connect(this.mus);
    o.start(time); o.stop(time+dur+0.02);
  },
  kick(t){
    const c=this.ctx,o=c.createOscillator(),g=c.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(30,t+0.12);
    g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
    o.connect(g); g.connect(this.mus); o.start(t); o.stop(t+0.25);
  },
  snare(t){
    const c=this.ctx;
    const n=c.createBufferSource(); n.buffer=this.noiseBuf;
    const bf=c.createBiquadFilter(); bf.type='bandpass'; bf.frequency.value=3000; bf.Q.value=0.8;
    const g=c.createGain(); g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    n.connect(bf); bf.connect(g); g.connect(this.mus); n.start(t); n.stop(t+0.1);
    const o=c.createOscillator(),g2=c.createGain();
    o.type='triangle'; o.frequency.value=180;
    g2.gain.setValueAtTime(0.1,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.06);
    o.connect(g2); g2.connect(this.mus); o.start(t); o.stop(t+0.06);
  },
  hat(t){
    const c=this.ctx;
    const n=c.createBufferSource(); n.buffer=this.noiseBuf;
    const f=c.createBiquadFilter(); f.type='highpass'; f.frequency.value=8000;
    const g=c.createGain(); g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.04);
    n.connect(f); f.connect(g); g.connect(this.mus); n.start(t); n.stop(t+0.04);
  },
  sfxTone(freq,dur,type,vol){
    if(!this.ctx) return;
    const c=this.ctx,o=c.createOscillator(),g=c.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.value=vol;
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);
    o.connect(g); g.connect(this.sfx); o.start(); o.stop(c.currentTime+dur);
  },
  play(name){
    if(!this.ctx) return;
    this.stop();
    this.track=TRACKS[name];
    if(!this.track) return;
    this.step=0; this.nextT=this.ctx.currentTime+0.05;
    this.playing=true; this._sched();
  },
  stop(){
    this.playing=false;
    if(this.tid){clearTimeout(this.tid); this.tid=null;}
  },
  _sched(){
    if(!this.playing||!this.track) return;
    while(this.nextT<this.ctx.currentTime+0.12){
      const tr=this.track, sd=60/tr.bpm/4, s=this.step%tr.len;
      for(const ch of tr.ch){
        const n=ch.p[s%ch.p.length];
        if(n==='_') continue;
        if(n==='K') this.kick(this.nextT);
        else if(n==='S') this.snare(this.nextT);
        else if(n==='H') this.hat(this.nextT);
        else{const f=this.nf(n); if(f) this.tone(f,this.nextT,ch.d||sd*0.9,ch.t||'square',ch.v||0.1,ch.f||3000);}
      }
      this.nextT+=sd; this.step++;
    }
    this.tid=setTimeout(()=>this._sched(),25);
  }
};

// ============================================================
//  UTILITY
// ============================================================
function rand(a,b){return a+Math.random()*(b-a)}
function randi(a,b){return Math.floor(rand(a,b+1))}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function lerp(a,b,t){return a+(b-a)*t}
function aabb(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

function shake(d,mag){shakeDur=d; shakeX=(Math.random()-0.5)*mag; shakeY=(Math.random()-0.5)*mag;}

// ============================================================
//  CAMERA
// ============================================================
const cam = {x:0, y:0, tx:0, ty:0};
function updateCamera(){
  const lx = player.x + player.vx*15;
  const ly = player.y - 80;
  cam.tx = lx - CW/2;
  cam.ty = ly - CH/2;
  const lvl = LEVELS[currentAct];
  cam.tx = clamp(cam.tx, 0, lvl.width - CW);
  cam.ty = clamp(cam.ty, -200, lvl.height - CH);
  cam.x = lerp(cam.x, cam.tx, 0.08);
  cam.y = lerp(cam.y, cam.ty, 0.08);
}

// ============================================================
//  PARTICLES
// ============================================================
let particles = [];
function spawnP(x,y,color,count,spdMin,spdMax,lifeMin,lifeMax,rMin,rMax){
  for(let i=0;i<count;i++){
    const a=rand(0,Math.PI*2), s=rand(spdMin||1,spdMax||4);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-rand(0,2),
      life:rand(lifeMin||15,lifeMax||35),maxLife:lifeMax||35,
      r:rand(rMin||2,rMax||5),color,gravity:0.1});
  }
}
function spawnJuice(x,y){spawnP(x,y,'#ff4081',12,2,6,20,40,3,7);}
function spawnSeedP(x,y){spawnP(x,y,'#4e342e',6,1,3,15,25,2,4);}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity;
    p.vx*=0.96; p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    X.globalAlpha=p.life/p.maxLife;
    X.fillStyle=p.color;
    X.beginPath(); X.arc(p.x-cam.x,p.y-cam.y,p.r,0,Math.PI*2); X.fill();
  }
  X.globalAlpha=1;
}

// ============================================================
//  DROPS (juice + seeds)
// ============================================================
let drops = [];
function spawnDrop(x,y,type,val){
  drops.push({x,y:y-10,vy:-rand(3,6),vx:rand(-2,2),type,val,life:300,r:type==='seed'?5:7});
}
function updateDrops(){
  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];
    d.vy+=0.3; d.y+=d.vy; d.x+=d.vx; d.vx*=0.98; d.life--;
    // land on platforms
    for(const p of currentPlatforms){
      if(d.y+d.r>p.y && d.y-d.r<p.y && d.vy>0 && d.x>p.x && d.x<p.x+p.w){
        d.y=p.y-d.r; d.vy=0; d.vx*=0.8;
      }
    }
    // collect
    const dx=d.x-player.x, dy=d.y-player.y;
    if(dx*dx+dy*dy<(player.r+d.r+10)*(player.r+d.r+10)){
      if(d.type==='juice'){player.hp=Math.min(player.maxHp,player.hp+d.val); spawnP(d.x,d.y,'#ff4081',5,1,3,10,20,2,3);}
      else{totalSeeds+=d.val; player.energy=Math.min(ULT_COST,player.energy+(d.val>2?5:2)); spawnP(d.x,d.y,'#ffd54f',5,1,3,10,20,2,3); sfxPickup();}
      drops.splice(i,1); continue;
    }
    if(d.life<=0) drops.splice(i,1);
  }
}
function drawDrops(){
  for(const d of drops){
    if(d.type==='juice'){
      X.fillStyle='#ff4081';
      X.beginPath(); X.arc(d.x-cam.x,d.y-cam.y,d.r,0,Math.PI*2); X.fill();
      X.fillStyle='#ff80ab';
      X.beginPath(); X.arc(d.x-cam.x-2,d.y-cam.y-2,d.r*0.4,0,Math.PI*2); X.fill();
    } else {
      X.fillStyle='#ffd54f';
      X.beginPath(); X.ellipse(d.x-cam.x,d.y-cam.y,d.r,d.r*0.7,0.3,0,Math.PI*2); X.fill();
      X.fillStyle='#fff176';
      X.beginPath(); X.arc(d.x-cam.x-1,d.y-cam.y-1,d.r*0.3,0,Math.PI*2); X.fill();
    }
  }
}

let player;
function initPlayer(){
  player = {
    x:200, y:400, vx:0, vy:0, w:44, h:44, r:22,
    hp:100, maxHp:100+upgrades.hp*20,
    speed: PLAYER_SPEED+upgrades.speed*0.5,
    damage: 1+upgrades.damage*0.5,
    range: SEED_SPEED+upgrades.range*1,
    atkCd: 0, atkRate: 18-upgrades.atkSpd*2,
    energy: 0,
    grounded: false, coyote: 0, jumpBuf: 0,
    dblJump: false, dashCd: 0, dashing: 0, dashVx: 0, dashVy: 0,
    facing: 1, rotation: 0, invuln: 0,
    alive: true
  };
}
initPlayer();

function updatePlayer(){
  if(!player.alive) return;

  // invulnerability frames
  if(player.invuln>0) player.invuln--;

  // dash
  if(player.dashing>0){
    player.x+=player.dashVx;
    player.y+=player.dashVy;
    player.dashing--;
    // dash trail
    if(tick%2===0) spawnP(player.x,player.y,'#80deea',3,0.5,2,8,15,player.r*0.6,player.r*0.8);
    if(player.dashing===0) spawnP(player.x,player.y,'#80deea',8,2,5,10,20,3,6);
    resolveCollisions();
    return;
  }

  // movement
  let mx=0;
  if(keys['ArrowLeft']||keys['KeyA']) mx=-1;
  if(keys['ArrowRight']||keys['KeyD']) mx=1;
  if(mx!==0) player.facing=mx;

  player.vx = mx * player.speed;

  // gravity
  player.vy += GRAVITY;
  if(player.vy>15) player.vy=15;

  // jump buffer
  if(keys['ArrowUp']||keys['KeyW']||keys['Space']){
    if(!player._jumpHeld){ player.jumpBuf=JUMP_BUF; player._jumpHeld=true; }
  } else { player._jumpHeld=false; }
  if(player.jumpBuf>0) player.jumpBuf--;

  // jump
  if(player.jumpBuf>0){
    if(player.grounded||player.coyote>0){
      player.vy=PLAYER_JUMP;
      player.grounded=false;
      player.coyote=0;
      player.jumpBuf=0;
      sfxJump();
      spawnP(player.x,player.y+player.r,'#a5d6a7',6,1,3,10,20,2,4);
    } else if(doubleJumpUnlocked&&!player.dblJump){
      player.vy=PLAYER_JUMP*0.85;
      player.dblJump=true;
      player.jumpBuf=0;
      sfxJump();
      spawnP(player.x,player.y+player.r,'#69f0ae',8,2,4,10,20,2,4);
    }
  }

  // dash
  if((keys['ShiftLeft']||keys['ShiftRight'])&&player.dashCd<=0){
    let aimX=mouseX+cam.x-player.x, aimY=mouseY+cam.y-player.y;
    const aimD=Math.hypot(aimX,aimY)||1;
    if(player.grounded) aimY=0; // horizontal dash on ground
    const nd=Math.hypot(aimX,aimY)||1;
    player.dashVx=(aimX/nd)*PLAYER_DASH;
    player.dashVy=(aimY/nd)*PLAYER_DASH;
    player.dashing=8;
    player.dashCd=DASH_CD;
    player.vy=0;
    sfxDash();
    spawnP(player.x,player.y,'#80deea',10,2,5,15,25,3,6);
    return;
  }
  if(player.dashCd>0) player.dashCd--;

  // apply velocity
  player.x+=player.vx;
  player.y+=player.vy;

  // rotation (rolling)
  player.rotation+=player.vx*0.04;

  // attack cooldown
  if(player.atkCd>0) player.atkCd--;

  // charge
  if(mouseDown && (gs==='play'||gs==='boss')) chargeTime++;

  // resolve collisions
  player.grounded=false;
  resolveCollisions();

  // coyote time
  if(player.grounded){ player.coyote=COYOTE; player.dblJump=false; }
  else if(player.coyote>0) player.coyote--;

  // ultimate
  if(keys['KeyE']&&player.energy>=ULT_COST) doUltimate();

  // fall death
  if(player.y>LEVELS[currentAct].height+200) hurtPlayer(999);
}

function resolveCollisions(){
  for(const p of currentPlatforms){
    // player AABB
    const px=player.x-player.w/2, py=player.y-player.h/2;
    const pw=player.w, ph=player.h;
    if(!(px<p.x+p.w && px+pw>p.x && py<p.y+p.h && py+ph>p.y)) continue;

    const overlapLeft=px+pw-p.x;
    const overlapRight=p.x+p.w-px;
    const overlapTop=py+ph-p.y;
    const overlapBottom=p.y+p.h-py;
    const minOverlap=Math.min(overlapLeft,overlapRight,overlapTop,overlapBottom);

    // Step-up: walk onto platforms with small height difference
    if((minOverlap===overlapLeft||minOverlap===overlapRight)&&overlapTop>0&&overlapTop<=26&&player.vy>=0){
      player.y=p.y-player.h/2; player.vy=0; player.grounded=true; continue;
    }

    if(minOverlap===overlapTop && player.vy>=0){
      player.y=p.y-player.h/2;
      player.vy=0;
      player.grounded=true;
    } else if(minOverlap===overlapBottom && player.vy<0){
      player.y=p.y+p.h+player.h/2;
      player.vy=0;
    } else if(minOverlap===overlapLeft){
      player.x=p.x-player.w/2;
      player.vx=0;
    } else if(minOverlap===overlapRight){
      player.x=p.x+p.w+player.w/2;
      player.vx=0;
    }
  }
}

function hurtPlayer(dmg){
  if(player.invuln>0||!player.alive) return;
  player.hp-=dmg;
  player.invuln=40;
  shake(10,6);
  spawnJuice(player.x,player.y);
  sfxHit();
  if(player.hp<=0){
    player.hp=0;
    player.alive=false;
    gs='gameover';
    SE.stop();
    spawnP(player.x,player.y,'#e53935',30,3,8,20,40,3,8);
    sfxExplosion();
  }
}

function drawPlayer(){
  const sx=player.x-cam.x, sy=player.y-cam.y;
  if(player.invuln>0 && tick%4<2) return;

  X.save();
  X.translate(sx,sy);
  X.rotate(player.rotation);

  // rind
  X.fillStyle='#388e3c';
  X.beginPath(); X.arc(0,0,player.r,0,Math.PI*2); X.fill();

  // stripes
  X.save(); X.beginPath(); X.arc(0,0,player.r,0,Math.PI*2); X.clip();
  X.strokeStyle='#2e7d32'; X.lineWidth=4;
  for(let i=-player.r;i<=player.r;i+=9){X.beginPath();X.moveTo(i,-player.r);X.lineTo(i,player.r);X.stroke();}
  X.restore();

  // red interior (face area)
  X.fillStyle='#e53935';
  X.beginPath(); X.arc(0,0,player.r*0.72,0,Math.PI*2); X.fill();

  // seeds on body
  X.fillStyle='#1a1a1a';
  const sd=[[-.25,-.15],[.2,-.2],[0,.1],[-.15,.25],[.3,.15]];
  for(const s of sd){X.beginPath();X.ellipse(s[0]*player.r,s[1]*player.r,player.r*.06,player.r*.12,s[0],0,Math.PI*2);X.fill();}

  X.restore();

  // eyes
  X.fillStyle='#fff';
  X.beginPath(); X.arc(sx-8,sy-8,6,0,Math.PI*2); X.fill();
  X.beginPath(); X.arc(sx+8,sy-8,6,0,Math.PI*2); X.fill();

  const aimA=Math.atan2(mouseY+cam.y-player.y,mouseX+cam.x-player.x);
  X.fillStyle='#111';
  X.beginPath(); X.arc(sx-8+Math.cos(aimA)*2,sy-8+Math.sin(aimA)*2,3,0,Math.PI*2); X.fill();
  X.beginPath(); X.arc(sx+8+Math.cos(aimA)*2,sy-8+Math.sin(aimA)*2,3,0,Math.PI*2); X.fill();

  // mouth
  if(player.alive){
    X.strokeStyle='#111'; X.lineWidth=2;
    X.beginPath(); X.arc(sx,sy+5,7,0.2,Math.PI-0.2); X.stroke();
  } else {
    X.strokeStyle='#111'; X.lineWidth=2;
    X.beginPath(); X.moveTo(sx-6,sy+8); X.quadraticCurveTo(sx,sy+3,sx+6,sy+8); X.stroke();
  }

  // charge indicator
  if(chargeTime>5 && mouseDown){
    const pct=Math.min(chargeTime/CHARGE_MAX,1);
    X.strokeStyle=`rgba(0,255,200,${0.3+pct*0.5})`;
    X.lineWidth=3;
    X.beginPath(); X.arc(sx,sy,player.r+8+pct*10, -Math.PI/2, -Math.PI/2+pct*Math.PI*2); X.stroke();
  }

  // energy bar (small, under player)
  if(player.energy>0){
    const bw=30, bh=4;
    X.fillStyle='#333'; X.fillRect(sx-bw/2,sy+player.r+6,bw,bh);
    X.fillStyle='#ffab00'; X.fillRect(sx-bw/2,sy+player.r+6,bw*(player.energy/ULT_COST),bh);
  }
}

let projectiles = [];
function doShoot(){
  if(player.atkCd>0) return;
  player.atkCd=player.atkRate;
  clickUsed=true;

  const aimA=Math.atan2(mouseY+cam.y-player.y, mouseX+cam.x-player.x);
  for(let i=-1;i<=1;i++){
    const a=aimA+i*SEED_FAN;
    projectiles.push({
      x:player.x+Math.cos(a)*player.r,
      y:player.y+Math.sin(a)*player.r,
      vx:Math.cos(a)*player.range, vy:Math.sin(a)*player.range,
      dmg:player.damage, life:40, r:4, type:'seed', owner:'player'
    });
  }
  sfxShoot();
  spawnSeedP(player.x+Math.cos(aimA)*player.r, player.y+Math.sin(aimA)*player.r);
}

function doChargedAttack(){
  clickUsed=true;
  const aimA=Math.atan2(mouseY+cam.y-player.y, mouseX+cam.x-player.x);
  projectiles.push({
    x:player.x, y:player.y,
    vx:Math.cos(aimA)*8, vy:Math.sin(aimA)*8,
    dmg:player.damage*3, life:30, r:30, type:'wave', owner:'player'
  });
  shake(8,4);
  sfxExplosion();
  spawnP(player.x,player.y,'#00e5ff',15,3,7,15,30,4,8);
}

function doUltimate(){
  player.energy=0;
  sfxExplosion();
  shake(20,10);
  // spawn falling watermelons in a radius
  for(let i=0;i<12;i++){
    const ox=rand(-300,300);
    projectiles.push({
      x:player.x+ox, y:player.y-400-rand(0,200),
      vx:rand(-1,1), vy:rand(8,14),
      dmg:player.damage*5, life:80, r:20, type:'melon', owner:'player'
    });
  }
  spawnP(player.x,player.y-100,'#4caf50',20,3,8,20,40,5,10);
}

function updateProjectiles(){
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.x+=p.vx; p.y+=p.vy;
    if(p.type==='melon') p.vy+=0.2;
    if(p.type==='wave'){ p.r+=2; p.dmg*=0.97; }
    p.life--;

    // platform collision for seeds and melons
    if(p.type!=='wave'){
      for(const pl of currentPlatforms){
        if(p.x>pl.x&&p.x<pl.x+pl.w&&p.y>pl.y&&p.y<pl.y+pl.h){
          if(p.type==='melon'){
            shake(5,3); sfxExplosion();
            spawnP(p.x,p.y,'#4caf50',10,2,5,10,25,3,6);
            // damage enemies near impact
            for(const e of enemies){
              if(dist(p,e)<60) hurtEnemy(e,p.dmg);
            }
            if(currentBoss && dist(p,currentBoss)<80) hurtBoss(p.dmg);
          }
          p.life=0; break;
        }
      }
    }

    // hit enemies
    if(p.owner==='player'){
      for(const e of enemies){
        if(!e.alive) continue;
        if(dist(p,e)<p.r+e.r){
          hurtEnemy(e,p.dmg);
          if(p.type==='seed'){p.life=0;break;}
        }
      }
      // hit boss
      if(currentBoss && currentBoss.alive){
        if(dist(p,currentBoss)<p.r+currentBoss.r){
          hurtBoss(p.dmg);
          if(p.type==='seed'){p.life=0;}
        }
      }
    }

    // enemy projectiles hit player
    if(p.owner==='enemy' && dist(p,player)<p.r+player.r){
      hurtPlayer(p.dmg);
      p.life=0;
    }

    if(p.life<=0) projectiles.splice(i,1);
  }
}

function drawProjectiles(){
  for(const p of projectiles){
    const sx=p.x-cam.x, sy=p.y-cam.y;
    if(p.type==='seed'){
      X.fillStyle='#4e342e';
      X.save(); X.translate(sx,sy); X.rotate(Math.atan2(p.vy,p.vx));
      X.beginPath(); X.ellipse(0,0,6,3,0,0,Math.PI*2); X.fill();
      X.restore();
    } else if(p.type==='wave'){
      X.globalAlpha=0.3+0.4*(p.life/30);
      X.fillStyle='#00e5ff';
      X.beginPath(); X.arc(sx,sy,p.r,0,Math.PI*2); X.fill();
      X.strokeStyle='#00bcd4'; X.lineWidth=3;
      X.beginPath(); X.arc(sx,sy,p.r,0,Math.PI*2); X.stroke();
      X.globalAlpha=1;
    } else if(p.type==='melon'){
      X.fillStyle='#388e3c';
      X.beginPath(); X.arc(sx,sy,p.r,0,Math.PI*2); X.fill();
      X.fillStyle='#2e7d32';
      X.beginPath(); X.arc(sx,sy,p.r*0.5,0,Math.PI*2); X.fill();
    } else if(p.type==='acid'){
      X.fillStyle='#76ff03';
      X.globalAlpha=0.7;
      X.beginPath(); X.arc(sx,sy,p.r,0,Math.PI*2); X.fill();
      X.globalAlpha=1;
    }
  }
}

let enemies = [];
let currentPlatforms = [];
let currentBoss = null;

const ENEMY_STATS = {
  bug_soldier: {hp:4,r:16,speed:1.5,dmg:8,score:3,color:'#5d4037'},
  worker_ant:  {hp:1,r:10,speed:2,dmg:4,score:1,color:'#3e2723'},

  wasp:        {hp:2,r:11,speed:2.5,dmg:7,score:3,color:'#fdd835',fly:true},
  cat:         {hp:8,r:18,speed:2.8,dmg:10,score:5,color:'#ff8a65'},
  pigeon:      {hp:3,r:13,speed:2,dmg:6,score:3,color:'#90a4ae',fly:true},

  soldier_net: {hp:8,r:18,speed:1.8,dmg:8,score:6,color:'#546e7a'},
  soldier_cryo:{hp:8,r:18,speed:1.8,dmg:8,score:6,color:'#4fc3f7'},
  chef:        {hp:7,r:17,speed:2,dmg:12,score:6,color:'#fafafa'},
  ninja_waiter:{hp:5,r:15,speed:3.5,dmg:10,score:6,color:'#212121'},
  sommelier:   {hp:6,r:16,speed:1.5,dmg:8,score:5,color:'#7b1fa2'},
  worm:        {hp:3,r:14,speed:1,dmg:6,score:3,color:'#8d6e63'},
  mantis:      {hp:10,r:20,speed:1.8,dmg:14,score:8,color:'#2e7d32'},
};

function createEnemy(type,x,y){
  const s=ENEMY_STATS[type];
  return {
    type, x, y, vx:0, vy:0, w:s.r*2, h:s.r*2, r:s.r,
    hp:s.hp, maxHp:s.hp, speed:s.speed, dmg:s.dmg, score:s.score,
    color:s.color, fly:s.fly||false,
    alive:true, facing:Math.random()<0.5?-1:1,
    atkCd:0, aggroRange:250, aggro:false,
    patrolX:x, patrolRange:100+rand(0,100),
    stateTimer:0, state:'patrol', stunTimer:0
  };
}

function spawnLevelEnemies(){
  enemies=[];
  const lvl=LEVELS[currentAct];
  if(!lvl.enemies) return;
  for(const e of lvl.enemies){
    const count=e.count||1;
    for(let i=0;i<count;i++){
      enemies.push(createEnemy(e.type, e.x+i*rand(20,50), e.y));
    }
  }
}

function updateEnemies(){
  for(const e of enemies){
    if(!e.alive) continue;
    if(e.stunTimer>0){e.stunTimer--;continue;}

    const dx=player.x-e.x, dy=player.y-e.y;
    const d=Math.hypot(dx,dy);
    e.aggro = d < e.aggroRange;

    if(e.fly){
      // flying enemies hover and chase
      if(e.aggro){
        e.vx+=(dx>0?1:-1)*0.15;
        e.vy+=(dy-40>0?1:-1)*0.1; // hover above player
      } else {
        e.vx+=Math.sin(tick*0.02+e.patrolX)*0.1;
        e.vy+=Math.cos(tick*0.02+e.patrolX)*0.08;
      }
      e.vx*=0.95; e.vy*=0.95;
      e.x+=e.vx; e.y+=e.vy;
      e.facing=e.vx>0?1:-1;

      // shoot if aggro
      if(e.aggro && e.atkCd<=0){
        e.atkCd=80+randi(0,40);
        const a=Math.atan2(dy,dx);
        projectiles.push({x:e.x,y:e.y,vx:Math.cos(a)*5,vy:Math.sin(a)*5,dmg:e.dmg,life:50,r:5,type:'acid',owner:'enemy'});
      }
    } else {
      // ground enemies
      if(e.aggro){
        // chase player
        e.vx = (dx>0?1:-1)*e.speed;
        e.facing = dx>0?1:-1;

        // attack check
        if(d<e.r+player.r+10 && e.atkCd<=0){
          hurtPlayer(e.dmg);
          e.atkCd=60;
        }

        // warrior ant / ranged enemies shoot
        if((e.type==='warrior_ant'||e.type==='gardener'||e.type==='sommelier'||e.type==='ninja_waiter')
            && d>60 && d<300 && e.atkCd<=0){
          e.atkCd=90+randi(0,40);
          const a=Math.atan2(dy,dx);
          const pType = e.type==='warrior_ant'?'acid':'seed';
          projectiles.push({x:e.x,y:e.y,vx:Math.cos(a)*6,vy:Math.sin(a)*6,dmg:e.dmg,life:50,r:5,type:pType,owner:'enemy'});
        }
      } else {
        // patrol
        e.vx = e.facing*e.speed*0.5;
        if(Math.abs(e.x-e.patrolX)>e.patrolRange) e.facing*=-1;
      }

      // gravity
      e.vy+=GRAVITY;
      e.x+=e.vx; e.y+=e.vy;

      // platform collision
      for(const p of currentPlatforms){
        const ex=e.x-e.w/2, ey=e.y-e.h/2;
        if(ex<p.x+p.w && ex+e.w>p.x && ey<p.y+p.h && ey+e.h>p.y){
          if(e.vy>=0 && ey+e.h-p.y<e.h*0.6){
            e.y=p.y-e.h/2; e.vy=0;
          }
        }
      }

      // turn at edges
      let onGround=false;
      for(const p of currentPlatforms){
        if(e.y+e.h/2>=p.y-2 && e.y+e.h/2<=p.y+5 && e.x>p.x-5 && e.x<p.x+p.w+5) onGround=true;
      }
      if(onGround){
        let atEdge=true;
        for(const p of currentPlatforms){
          if(e.x+e.facing*20>p.x && e.x+e.facing*20<p.x+p.w && Math.abs(e.y+e.h/2-p.y)<10) atEdge=false;
        }
        if(atEdge) e.facing*=-1;
      }
    }

    if(e.atkCd>0) e.atkCd--;
  }
}

function hurtEnemy(e,dmg){
  e.hp-=dmg;
  spawnP(e.x,e.y,e.color,5,1,3,10,20,2,4);
  sfxHit();
  e.stunTimer=8;
  e.aggro=true;
  if(e.hp<=0){
    e.alive=false;
    spawnP(e.x,e.y,e.color,12,2,5,15,30,3,6);
    spawnJuice(e.x,e.y);
    // drop seeds and juice
    for(let i=0;i<randi(1,3);i++) spawnDrop(e.x,e.y,'seed',e.score);
    if(Math.random()<0.4) spawnDrop(e.x,e.y,'juice',10);
    sfxExplosion();
  }
}

function drawEnemies(){
  for(const e of enemies){
    if(!e.alive) continue;
    const sx=e.x-cam.x, sy=e.y-cam.y;

    if(e.stunTimer>0 && tick%3<1) continue;

    // body
    X.fillStyle = e.aggro? brighten(e.color,30) : e.color;
    X.beginPath(); X.arc(sx,sy,e.r,0,Math.PI*2); X.fill();

    // type-specific drawing
    if(e.type==='worker_ant'){
      // antennae
      X.strokeStyle='#2e1a0e'; X.lineWidth=1;
      X.beginPath(); X.moveTo(sx+e.facing*e.r*0.5,sy-e.r);
      X.lineTo(sx+e.facing*(e.r+6),sy-e.r-5); X.stroke();
      X.beginPath(); X.moveTo(sx-e.facing*e.r*0.2,sy-e.r);
      X.lineTo(sx+e.facing*2,sy-e.r-6); X.stroke();
    }
    if(e.type==='bug_soldier'){
      // horn
      X.strokeStyle='#3e2723'; X.lineWidth=3;
      X.beginPath(); X.moveTo(sx+e.facing*e.r,sy-3);
      X.lineTo(sx+e.facing*(e.r+10),sy-10); X.stroke();
      X.beginPath(); X.moveTo(sx+e.facing*e.r,sy+3);
      X.lineTo(sx+e.facing*(e.r+8),sy-5); X.stroke();
      // shell pattern
      X.strokeStyle='#4e342e'; X.lineWidth=1;
      X.beginPath(); X.moveTo(sx,sy-e.r); X.lineTo(sx,sy+e.r); X.stroke();
    }
    if(e.type==='warrior_ant'){
      // mandibles
      X.strokeStyle='#7b1fa2'; X.lineWidth=3;
      X.beginPath(); X.moveTo(sx+e.facing*e.r,sy-5);
      X.lineTo(sx+e.facing*(e.r+12),sy); X.stroke();
      X.beginPath(); X.moveTo(sx+e.facing*e.r,sy+5);
      X.lineTo(sx+e.facing*(e.r+12),sy); X.stroke();
    }
    if(e.type==='mantis'){
      // scythe arms
      X.strokeStyle='#1b5e20'; X.lineWidth=3;
      const sw=Math.sin(tick*0.08)*4;
      X.beginPath(); X.moveTo(sx+e.facing*e.r*0.6,sy-e.r*0.3);
      X.quadraticCurveTo(sx+e.facing*(e.r+14),sy-e.r-6+sw,sx+e.facing*(e.r+8),sy-e.r+4+sw); X.stroke();
      X.beginPath(); X.moveTo(sx+e.facing*e.r*0.6,sy+e.r*0.1);
      X.quadraticCurveTo(sx+e.facing*(e.r+14),sy+2-sw,sx+e.facing*(e.r+8),sy+e.r*0.4-sw); X.stroke();
      // head triangle
      X.fillStyle='#388e3c';
      X.beginPath();
      X.moveTo(sx+e.facing*e.r,sy-4);
      X.lineTo(sx+e.facing*(e.r+7),sy);
      X.lineTo(sx+e.facing*e.r,sy+4);
      X.fill();
    }
    if(e.type==='wasp'||e.type==='pigeon'){
      // wings
      X.fillStyle='rgba(255,255,255,0.3)';
      const wf=Math.sin(tick*0.3)*5;
      X.beginPath(); X.ellipse(sx-6,sy-e.r-wf,8,4,-.3,0,Math.PI*2); X.fill();
      X.beginPath(); X.ellipse(sx+6,sy-e.r-wf,8,4,.3,0,Math.PI*2); X.fill();
    }
    if(e.type==='cat'){
      // ears
      X.fillStyle=e.color;
      X.beginPath(); X.moveTo(sx-8,sy-e.r); X.lineTo(sx-12,sy-e.r-10); X.lineTo(sx-4,sy-e.r); X.fill();
      X.beginPath(); X.moveTo(sx+8,sy-e.r); X.lineTo(sx+12,sy-e.r-10); X.lineTo(sx+4,sy-e.r); X.fill();
      // tail
      X.strokeStyle=e.color; X.lineWidth=3;
      X.beginPath(); X.moveTo(sx-e.facing*e.r,sy);
      X.quadraticCurveTo(sx-e.facing*(e.r+15),sy-15,sx-e.facing*(e.r+10),sy-25); X.stroke();
    }
    if(e.type==='cockroach'){
      // antennae
      X.strokeStyle='#5d4037'; X.lineWidth=1.5;
      const aw=Math.sin(tick*0.2)*3;
      X.beginPath(); X.moveTo(sx+e.facing*e.r*0.3,sy-e.r);
      X.quadraticCurveTo(sx+e.facing*(e.r+5),sy-e.r-10+aw,sx+e.facing*(e.r+12),sy-e.r-6+aw); X.stroke();
      X.beginPath(); X.moveTo(sx-e.facing*e.r*0.1,sy-e.r);
      X.quadraticCurveTo(sx+e.facing*2,sy-e.r-12-aw,sx+e.facing*8,sy-e.r-10-aw); X.stroke();
    }
    if(e.type==='squirrel'){
      // bushy tail
      X.fillStyle='#8d6e63';
      X.beginPath();
      X.arc(sx-e.facing*e.r*0.8,sy-e.r*0.6,e.r*0.7,0,Math.PI*2); X.fill();
      // ear tufts
      X.fillStyle='#6d4c41';
      X.beginPath(); X.moveTo(sx-6,sy-e.r); X.lineTo(sx-8,sy-e.r-7); X.lineTo(sx-3,sy-e.r); X.fill();
      X.beginPath(); X.moveTo(sx+6,sy-e.r); X.lineTo(sx+8,sy-e.r-7); X.lineTo(sx+3,sy-e.r); X.fill();
    }
    if(e.type==='toxic_slug'){
      // slime trail
      X.fillStyle='rgba(76,175,80,0.25)';
      for(let i=1;i<5;i++){
        X.beginPath(); X.arc(sx-e.facing*i*8,sy+e.r-2,4-i*0.5,0,Math.PI*2); X.fill();
      }
    }
    if(e.type==='chef'){
      // chef hat
      X.fillStyle='#fff';
      X.fillRect(sx-8,sy-e.r-12,16,12);
      X.fillRect(sx-10,sy-e.r-2,20,4);
    }
    if(e.type==='ninja_waiter'){
      // headband
      X.fillStyle='#c62828'; X.fillRect(sx-e.r,sy-e.r*0.5,e.r*2,3);
      // trailing cloth
      X.strokeStyle='#c62828'; X.lineWidth=2;
      X.beginPath(); X.moveTo(sx-e.facing*e.r,sy-e.r*0.5);
      X.lineTo(sx-e.facing*(e.r+10),sy-e.r*0.3+Math.sin(tick*0.15)*3); X.stroke();
    }
    if(e.type==='janitor'){
      // broom handle
      X.strokeStyle='#795548'; X.lineWidth=3;
      X.beginPath(); X.moveTo(sx+e.facing*e.r,sy-e.r*0.2);
      X.lineTo(sx+e.facing*(e.r+16),sy+e.r*0.6); X.stroke();
      // cap
      X.fillStyle='#455a64'; X.fillRect(sx-7,sy-e.r-3,14,5);
    }
    if(e.type==='gardener'){
      // straw hat
      X.fillStyle='#c8b560'; X.fillRect(sx-11,sy-e.r-2,22,4);
      X.fillStyle='#d4c474'; X.fillRect(sx-6,sy-e.r-7,12,6);
    }
    if(e.type==='robo_bug'){
      // antenna + signal
      X.strokeStyle='#b0bec5'; X.lineWidth=2;
      X.beginPath(); X.moveTo(sx,sy-e.r); X.lineTo(sx,sy-e.r-10); X.stroke();
      X.fillStyle='#f44336';
      X.beginPath(); X.arc(sx,sy-e.r-12,2,0,Math.PI*2); X.fill();
      // visor
      X.fillStyle='rgba(33,150,243,0.5)'; X.fillRect(sx-e.r*0.6,sy-e.r*0.4,e.r*1.2,4);
    }
    if(e.type==='mutant_rat'){
      // glowing eyes
      X.fillStyle='#e040fb';
      X.beginPath(); X.arc(sx+e.facing*e.r*0.5,sy-e.r*0.3,2.5,0,Math.PI*2); X.fill();
      // tail
      X.strokeStyle='#ce93d8'; X.lineWidth=2;
      X.beginPath(); X.moveTo(sx-e.facing*e.r,sy);
      X.quadraticCurveTo(sx-e.facing*(e.r+12),sy+8,sx-e.facing*(e.r+18),sy-2); X.stroke();
    }
    if(e.type==='soldier_net'||e.type==='soldier_cryo'){
      // helmet
      X.fillStyle=e.type==='soldier_cryo'?'#29b6f6':'#37474f';
      X.beginPath(); X.arc(sx,sy-e.r*0.5,e.r*0.7,Math.PI,0); X.fill();
      // visor line
      X.strokeStyle='rgba(0,0,0,0.4)'; X.lineWidth=2;
      X.beginPath(); X.moveTo(sx-e.r*0.5,sy-e.r*0.4); X.lineTo(sx+e.r*0.5,sy-e.r*0.4); X.stroke();
    }
    if(e.type==='sommelier'){
      // monocle
      X.strokeStyle='#ffd54f'; X.lineWidth=1.5;
      X.beginPath(); X.arc(sx+e.facing*e.r*0.4,sy-e.r*0.25,4,0,Math.PI*2); X.stroke();
      X.beginPath(); X.moveTo(sx+e.facing*e.r*0.4,sy-e.r*0.25+4);
      X.lineTo(sx+e.facing*e.r*0.2,sy+e.r*0.3); X.stroke();
    }

    // legs (ground enemies)
    if(!e.fly){
      X.strokeStyle=darkenColor(e.color,40); X.lineWidth=2;
      const lw=Math.sin(tick*0.15)*3;
      X.beginPath(); X.moveTo(sx-e.r*0.4,sy+e.r); X.lineTo(sx-e.r*0.5,sy+e.r+8+lw); X.stroke();
      X.beginPath(); X.moveTo(sx+e.r*0.4,sy+e.r); X.lineTo(sx+e.r*0.5,sy+e.r+8-lw); X.stroke();
    }

    // eyes
    const ea=e.aggro?Math.atan2(player.y-e.y,player.x-e.x):e.facing*0.3;
    X.fillStyle='#fff';
    X.beginPath(); X.arc(sx+e.facing*e.r*0.4,sy-e.r*0.2,3,0,Math.PI*2); X.fill();
    X.fillStyle=e.aggro?'#f44336':'#111';
    X.beginPath(); X.arc(sx+e.facing*e.r*0.4+Math.cos(ea)*1.5,sy-e.r*0.2+Math.sin(ea)*1.5,1.5,0,Math.PI*2); X.fill();

    // aggro indicator
    if(e.aggro){
      X.fillStyle='#f44336'; X.font='bold 12px Arial'; X.textAlign='center';
      X.fillText('!',sx,sy-e.r-8); X.textAlign='left';
    }

    // HP bar
    if(e.hp<e.maxHp){
      const bw=e.r*2, bh=3;
      X.fillStyle='#333'; X.fillRect(sx-bw/2,sy-e.r-14,bw,bh);
      X.fillStyle='#ef5350'; X.fillRect(sx-bw/2,sy-e.r-14,bw*(e.hp/e.maxHp),bh);
    }
  }
}

function brighten(hex,amt){
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt); g=Math.min(255,g+amt); b=Math.min(255,b+amt);
  return '#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('');
}
function darkenColor(hex,amt){
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,r-amt); g=Math.max(0,g-amt); b=Math.max(0,b-amt);
  return '#'+[r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('');
}

// ============================================================
//  BOSSES
// ============================================================
const BOSS_DATA = {
  hrush:    {name:'Хрущ',hp:60,r:35,color:'#5d4037',phases:2},
  charlotte:{name:'Крыса-Королева Шарлотта',hp:100,r:40,color:'#795548',phases:3},
  karlusha: {name:'Ворона-Генерал Карлуша',hp:80,r:30,color:'#37474f',phases:2},
  worm:     {name:'Мусорный Червь',hp:120,r:45,color:'#4e342e',phases:3},
  nozhov:   {name:'Полковник Ножов',hp:140,r:38,color:'#455a64',phases:3},
  duval:    {name:'Жан-Пьер Дюваль',hp:200,r:42,color:'#fafafa',phases:3},
};

function createBoss(type,x,y){
  const d=BOSS_DATA[type];
  return {
    type,x,y,vx:0,vy:0,r:d.r,
    hp:d.hp,maxHp:d.hp,color:d.color,name:d.name,
    phase:1,maxPhase:d.phases,
    alive:true,facing:-1,
    atkCd:0,stateTimer:0,state:'idle',
    flashTimer:0,shieldFront:false,
    enraged:false, flyY:0, swoopTarget:null
  };
}

function updateBoss(){
  const b=currentBoss;
  if(!b||!b.alive) return;

  b.flashTimer=Math.max(0,b.flashTimer-1);

  // phase transitions
  const hpPct=b.hp/b.maxHp;
  if(b.maxPhase>=3 && hpPct<=0.33 && b.phase<3) { b.phase=3; b.state='transition'; b.stateTimer=60; shake(15,8); sfxExplosion(); }
  else if(b.maxPhase>=2 && hpPct<=0.5 && b.phase<2) { b.phase=2; b.state='transition'; b.stateTimer=60; shake(12,6); sfxExplosion(); }

  if(b.state==='transition'){
    b.stateTimer--;
    if(b.stateTimer<=0) b.state='idle';
    return;
  }

  // boss-specific AI
  switch(b.type){
    case 'hrush': aiHrush(b); break;
    case 'charlotte': aiCharlotte(b); break;
    case 'karlusha': aiKarlusha(b); break;
    case 'worm': aiWorm(b); break;
    case 'nozhov': aiNozhov(b); break;
    case 'duval': aiDuval(b); break;
  }
}

function hurtBoss(dmg){
  const b=currentBoss;
  if(!b||!b.alive) return;
  if(b.shieldFront){
    const dx=player.x-b.x;
    if((dx>0&&b.facing>0)||(dx<0&&b.facing<0)){
      spawnP(b.x+b.facing*b.r,b.y,'#fdd835',5,2,4,10,15,2,4);
      return; // blocked
    }
  }
  b.hp-=dmg;
  b.flashTimer=6;
  sfxBossHit();
  spawnP(b.x,b.y,b.color,6,2,4,10,20,3,5);
  if(b.hp<=0){
    b.hp=0; b.alive=false;
    defeatBoss();
  }
}

function defeatBoss(){
  SE.stop();
  shake(25,12);
  sfxExplosion();
  const b=currentBoss;
  spawnP(b.x,b.y,b.color,40,3,10,20,50,4,10);
  spawnP(b.x,b.y,'#ffd54f',20,2,6,20,40,3,7);

  // drops
  for(let i=0;i<20;i++) spawnDrop(b.x+rand(-40,40),b.y,'seed',5);
  for(let i=0;i<5;i++) spawnDrop(b.x+rand(-30,30),b.y,'juice',20);

  // unlock mutation
  const mutMap={hrush:'chitin_armor',charlotte:'plague_wave',karlusha:'air_strike',worm:'corrosion',nozhov:'exo_rind'};
  if(mutMap[b.type] && !mutations.includes(mutMap[b.type])) mutations.push(mutMap[b.type]);

  // unlock double jump after Act 1
  if(currentAct===1) doubleJumpUnlocked=true;

  // capture territory
  if(!capturedTerritories.includes(currentAct)){
    capturedTerritories.push(currentAct);
  }

  // transition to upgrade screen after delay
  setTimeout(()=>{
    if(currentAct<6){
      gs='upgrade';
    } else {
      // show final cutscene
      gs='cutscene';
      cutsceneData=[
        {speaker:'АРБУЗИЛЛА',text:'Мир принадлежит мне. От бахчи до горизонта — всё зелено.'},
        {speaker:'АРБУЗИЛЛА',text:'Но это лишь начало. Я слышу, что где-то далеко... существуют другие фрукты с таким же даром.'},
        {speaker:'АРБУЗИЛЛА',text:'Дынная Империя на востоке. Тыквенный Альянс на севере.'},
        {speaker:'АРБУЗИЛЛА',text:'Война за урожай только начинается.'},
      ];
      cutsceneIdx=0;
      cutsceneNextState='victory';
    }
  }, 2000);
}

// ── Boss AI: Hrush (Act 1) ──────────────────────────────────
function aiHrush(b){
  const dx=player.x-b.x, dy=player.y-b.y, d=Math.hypot(dx,dy);
  b.facing=dx>0?1:-1;

  if(b.phase===1){
    b.vy+=GRAVITY; b.y+=b.vy;
    // ground collision
    for(const p of currentPlatforms){
      if(b.y+b.r>p.y && b.y-b.r<p.y+p.h && b.x>p.x && b.x<p.x+p.w && b.vy>=0){
        b.y=p.y-b.r; b.vy=0;
      }
    }

    switch(b.state){
      case 'idle':
        b.vx*=0.9;
        b.stateTimer++;
        b.shieldFront=false;
        if(b.stateTimer>60){
          const r=Math.random();
          if(r<0.4) {b.state='charge';b.stateTimer=30;b.shieldFront=true;}
          else if(r<0.7) {b.state='summon';b.stateTimer=60;}
          else {b.state='slam';b.stateTimer=40;}
        }
        break;
      case 'charge':
        b.stateTimer--;
        if(b.stateTimer>0){
          // telegraph
          b.shieldFront=true;
        } else {
          b.vx=b.facing*8;
          b.x+=b.vx;
          // check if hit wall
          let hitWall=false;
          for(const p of currentPlatforms){
            if(p.h>100 && b.x+b.r>p.x && b.x-b.r<p.x+p.w){
              hitWall=true; break;
            }
          }
          if(hitWall||b.x<currentPlatforms[0]?.x||b.x>5000){
            b.state='stunned'; b.stateTimer=90; b.shieldFront=false;
            shake(10,5); sfxHit();
            spawnP(b.x,b.y,'#fdd835',10,2,5,10,20,3,5);
          }
          // hit player during charge
          if(d<b.r+player.r+5) hurtPlayer(15);
          // timeout charge
          if(Math.abs(b.vx)<0.5){ b.state='idle'; b.stateTimer=0; }
        }
        break;
      case 'stunned':
        b.stateTimer--;
        b.shieldFront=false;
        b.vx*=0.9;
        if(b.stateTimer<=0){b.state='idle';b.stateTimer=0;}
        break;
      case 'summon':
        b.stateTimer--;
        if(b.stateTimer===30){
          for(let i=0;i<4;i++){
            enemies.push(createEnemy('worker_ant',b.x+rand(-80,80),b.y-20));
          }
          spawnP(b.x,b.y,'#8d6e63',10,2,5,10,20,3,5);
        }
        if(b.stateTimer<=0){b.state='idle';b.stateTimer=0;}
        break;
      case 'slam':
        b.stateTimer--;
        if(b.stateTimer>20){
          b.vy=-2; // rising
        } else if(b.stateTimer===0){
          // slam down
          b.vy=15;
          shake(8,5);
          // damage nearby player
          if(Math.abs(dx)<100 && dy>-20 && dy<50) hurtPlayer(12);
          spawnP(b.x,b.y+b.r,'#8d6e63',12,2,5,10,25,3,6);
          b.state='idle'; b.stateTimer=0;
        }
        break;
    }
  } else {
    // Phase 2: flying
    if(!b.flyY) b.flyY=b.y-150;
    const targetY=b.flyY+Math.sin(tick*0.03)*40;
    b.y=lerp(b.y,targetY,0.05);
    b.x+=Math.sin(tick*0.02)*2;
    b.shieldFront=false;

    switch(b.state){
      case 'idle':
        b.stateTimer++;
        if(b.stateTimer>80){
          const r=Math.random();
          if(r<0.4){b.state='swoop';b.stateTimer=40;b.swoopTarget={x:player.x,y:player.y};}
          else if(r<0.7){b.state='larvae';b.stateTimer=60;}
          else{b.state='summon';b.stateTimer=60;}
        }
        break;
      case 'swoop':
        b.stateTimer--;
        if(b.stateTimer>20){
          // telegraph
        } else if(b.stateTimer>0){
          const t=b.swoopTarget;
          b.x=lerp(b.x,t.x,0.15);
          b.y=lerp(b.y,t.y,0.15);
          if(dist(b,player)<b.r+player.r) hurtPlayer(15);
        } else {
          b.state='idle';b.stateTimer=0;
        }
        break;
      case 'larvae':
        b.stateTimer--;
        if(b.stateTimer%15===0 && b.stateTimer>0){
          enemies.push(createEnemy('worker_ant',b.x+rand(-60,60),b.y+b.r));
        }
        if(b.stateTimer<=0){b.state='idle';b.stateTimer=0;}
        break;
      case 'summon':
        b.stateTimer--;
        if(b.stateTimer===30){
          for(let i=0;i<3;i++) enemies.push(createEnemy('bug_soldier',b.x+rand(-100,100),b.y+100));
          spawnP(b.x,b.y,'#8d6e63',10,2,5,10,20,3,5);
        }
        if(b.stateTimer<=0){b.state='idle';b.stateTimer=0;}
        break;
    }
  }
}

// ── Boss AI: Charlotte (Act 2) ──────────────────────────────
function aiCharlotte(b){
  const dx=player.x-b.x, dy=player.y-b.y, d=Math.hypot(dx,dy);
  b.facing=dx>0?1:-1;
  b.vy+=GRAVITY; b.y+=b.vy;
  for(const p of currentPlatforms){
    if(b.y+b.r>p.y && b.y-b.r<p.y+p.h && b.x>p.x && b.x<p.x+p.w && b.vy>=0){
      b.y=p.y-b.r; b.vy=0;
    }
  }

  b.stateTimer++;
  if(b.stateTimer>80){
    b.stateTimer=0;
    const r=Math.random();
    if(r<0.3){
      // summon rats
      for(let i=0;i<(b.phase+1);i++) enemies.push(createEnemy('worker_ant',b.x+rand(-80,80),b.y-20));
      spawnP(b.x,b.y,'#795548',8,2,4,10,20,3,5);
    } else if(r<0.6){
      // throw toxic
      for(let i=0;i<3;i++){
        const a=Math.atan2(dy,dx)+rand(-0.3,0.3);
        projectiles.push({x:b.x,y:b.y,vx:Math.cos(a)*7,vy:Math.sin(a)*7-2,dmg:10,life:60,r:8,type:'acid',owner:'enemy'});
      }
    } else {
      // tail whip (phase 2+)
      if(b.phase>=2 && d<120){
        hurtPlayer(15);
        shake(8,4);
        spawnP(player.x,player.y,'#795548',8,2,5,10,20,3,5);
      }
    }
  }
  // phase 3: move faster
  if(b.phase===3){
    b.x+=b.facing*2;
    if(d<b.r+player.r+15 && b.atkCd<=0){ hurtPlayer(12); b.atkCd=40; }
    if(b.atkCd>0) b.atkCd--;
  }
}

// ── Boss AI: Karlusha (Act 3) ───────────────────────────────
function aiKarlusha(b){
  const dx=player.x-b.x, dy=player.y-b.y;
  b.facing=dx>0?1:-1;
  // always flying
  const ty=200+Math.sin(tick*0.02)*60;
  b.y=lerp(b.y,ty,0.03);
  b.x+=Math.sin(tick*0.015)*3;

  b.stateTimer++;
  if(b.stateTimer>70){
    b.stateTimer=0;
    const r=Math.random();
    if(r<0.35){
      // V-formation pigeon attack
      for(let i=0;i<5;i++){
        const e=createEnemy('pigeon',b.x+i*30-60,b.y+Math.abs(i-2)*20);
        e.vy=3; enemies.push(e);
      }
    } else if(r<0.65){
      // bombing run
      for(let i=0;i<4;i++){
        projectiles.push({x:player.x+rand(-100,100),y:b.y,vx:0,vy:8,dmg:12,life:50,r:10,type:'acid',owner:'enemy'});
      }
    } else if(b.phase===2){
      // hawk kamikaze
      const e=createEnemy('cat',b.x,b.y);
      e.speed=5; e.hp=15; e.dmg=20; e.aggroRange=500; e.aggro=true;
      enemies.push(e);
      spawnP(b.x,b.y,'#37474f',10,2,5,10,20,3,5);
    }
  }
}

// ── Boss AI: Worm (Act 4) ───────────────────────────────────
function aiWorm(b){
  const dx=player.x-b.x, dy=player.y-b.y;
  b.facing=dx>0?1:-1;
  // worm emerges and submerges
  b.stateTimer++;
  const groundY=LEVELS[currentAct].height-100;

  switch(b.state){
    case 'idle':
      b.y=lerp(b.y,groundY+50,0.05); // underground
      if(b.stateTimer>60){
        b.state='emerge'; b.stateTimer=0;
        b.x=player.x+rand(-100,100);
      }
      break;
    case 'emerge':
      b.y=lerp(b.y,groundY-80,0.08);
      if(b.stateTimer>40){
        b.state='attack'; b.stateTimer=0;
      }
      break;
    case 'attack':
      b.stateTimer++;
      if(b.stateTimer===20){
        // slam segments
        for(let i=0;i<3;i++){
          projectiles.push({x:b.x+rand(-60,60),y:b.y+b.r,vx:rand(-2,2),vy:5,dmg:12,life:40,r:15,type:'acid',owner:'enemy'});
        }
        shake(8,5);
      }
      if(b.stateTimer===50 && b.phase>=2){
        // spawn small worms
        for(let i=0;i<4;i++) enemies.push(createEnemy('worm',b.x+rand(-80,80),b.y));
      }
      if(b.stateTimer>70){ b.state='idle'; b.stateTimer=0; }
      break;
    case 'transition':
      b.stateTimer--;
      if(b.stateTimer<=0) b.state='idle';
      break;
  }
  // phase 3: exposed core, stays emerged
  if(b.phase===3){
    b.y=lerp(b.y,groundY-100,0.05);
    b.state='attack';
    if(b.stateTimer%30===0){
      projectiles.push({x:b.x,y:b.y,vx:(dx>0?1:-1)*5,vy:-3,dmg:15,life:50,r:12,type:'acid',owner:'enemy'});
    }
  }
}

// ── Boss AI: Nozhov (Act 5) ─────────────────────────────────
function aiNozhov(b){
  const dx=player.x-b.x, dy=player.y-b.y, d=Math.hypot(dx,dy);
  b.facing=dx>0?1:-1;
  b.vy+=GRAVITY; b.y+=b.vy;
  for(const p of currentPlatforms){
    if(b.y+b.r>p.y && b.y-b.r<p.y+p.h && b.x>p.x && b.x<p.x+p.w && b.vy>=0){
      b.y=p.y-b.r; b.vy=0;
    }
  }

  b.stateTimer++;

  if(b.phase===1){
    // swordsman
    b.x+=b.facing*2;
    if(b.stateTimer>50){
      b.stateTimer=0;
      if(d<100){ hurtPlayer(18); shake(6,4); spawnP(player.x,player.y,'#b0bec5',8,2,5,10,20,3,5); }
      else { b.vy=-10; b.x+=b.facing*50; }// lunge
    }
  } else if(b.phase===2){
    // ranged
    if(b.stateTimer>40){
      b.stateTimer=0;
      const r=Math.random();
      if(r<0.5){
        // boomerang machete
        const a=Math.atan2(dy,dx);
        projectiles.push({x:b.x,y:b.y,vx:Math.cos(a)*10,vy:Math.sin(a)*10-2,dmg:15,life:60,r:15,type:'acid',owner:'enemy'});
      } else {
        // shoulder cannon
        for(let i=0;i<3;i++){
          const a=Math.atan2(dy,dx)+rand(-0.2,0.2);
          projectiles.push({x:b.x,y:b.y-10,vx:Math.cos(a)*8,vy:Math.sin(a)*8,dmg:10,life:50,r:6,type:'acid',owner:'enemy'});
        }
      }
    }
  } else {
    // berserker - fast, two knives
    b.x+=b.facing*4;
    if(d<80 && b.atkCd<=0){ hurtPlayer(12); b.atkCd=20; }
    if(b.atkCd>0) b.atkCd--;
    if(b.stateTimer>30){
      b.stateTimer=0;
      b.vy=-8; b.x+=b.facing*40;
    }
  }
}

// ── Boss AI: Duval (Act 6 - Final Boss) ─────────────────────
function aiDuval(b){
  const dx=player.x-b.x, dy=player.y-b.y, d=Math.hypot(dx,dy);
  b.facing=dx>0?1:-1;
  b.vy+=GRAVITY; b.y+=b.vy;
  for(const p of currentPlatforms){
    if(b.y+b.r>p.y && b.y-b.r<p.y+p.h && b.x>p.x && b.x<p.x+p.w && b.vy>=0){
      b.y=p.y-b.r; b.vy=0;
    }
  }

  b.stateTimer++;

  if(b.phase===1){
    // Master Chef - throws knives, boiling sauce, summons cooks
    if(b.stateTimer>50){
      b.stateTimer=0;
      const r=Math.random();
      if(r<0.35){
        // knife fan
        for(let i=-2;i<=2;i++){
          const a=Math.atan2(dy,dx)+i*0.2;
          projectiles.push({x:b.x,y:b.y,vx:Math.cos(a)*9,vy:Math.sin(a)*9,dmg:12,life:50,r:5,type:'acid',owner:'enemy'});
        }
      } else if(r<0.65){
        // boiling sauce
        projectiles.push({x:b.x,y:b.y,vx:(dx>0?1:-1)*6,vy:-4,dmg:15,life:60,r:18,type:'acid',owner:'enemy'});
      } else {
        // summon cooks
        for(let i=0;i<2;i++) enemies.push(createEnemy('chef',b.x+rand(-80,80),b.y-20));
      }
    }
  } else if(b.phase===2){
    // Haute Cuisine - freeze zones, caramel walls, conveyor
    if(b.stateTimer>40){
      b.stateTimer=0;
      const r=Math.random();
      if(r<0.3){
        // liquid nitrogen freeze (area attack)
        for(let i=0;i<5;i++){
          projectiles.push({x:b.x+rand(-150,150),y:b.y-50,vx:0,vy:6,dmg:10,life:40,r:15,type:'acid',owner:'enemy'});
        }
      } else if(r<0.6){
        // dry ice balls
        for(let i=0;i<4;i++){
          const a=rand(0,Math.PI*2);
          projectiles.push({x:b.x,y:b.y,vx:Math.cos(a)*7,vy:Math.sin(a)*7,dmg:12,life:50,r:8,type:'acid',owner:'enemy'});
        }
      } else {
        // blender pull (attract player toward boss)
        player.vx+=(b.x-player.x>0?1:-1)*2;
      }
    }
    b.x+=Math.sin(tick*0.03)*3;
  } else {
    // Le Chef Suprême - mutated, blade arms, oil spray
    b.r=55; // bigger
    b.x+=b.facing*3;
    if(d<100 && b.atkCd<=0){ hurtPlayer(20); b.atkCd=25; shake(10,6); }
    if(b.atkCd>0) b.atkCd--;
    if(b.stateTimer>35){
      b.stateTimer=0;
      // oil spray
      for(let i=-3;i<=3;i++){
        const a=Math.atan2(dy,dx)+i*0.15;
        projectiles.push({x:b.x,y:b.y,vx:Math.cos(a)*8,vy:Math.sin(a)*8,dmg:14,life:45,r:7,type:'acid',owner:'enemy'});
      }
    }
  }
}

function drawBoss(){
  const b=currentBoss;
  if(!b||!b.alive) return;
  const sx=b.x-cam.x, sy=b.y-cam.y;

  // telegraph warning indicators
  if(b.state==='charge' && b.stateTimer>0){
    // charge direction warning
    X.fillStyle='#f4433644';
    X.fillRect(sx,sy-5,b.facing*200,10);
    X.fillStyle='#f44336'; X.font='bold 14px Arial'; X.textAlign='center';
    X.fillText('⚠️',sx+b.facing*80,sy-15);
    X.textAlign='left';
  }
  if(b.state==='swoop' && b.stateTimer>15){
    // swoop target marker
    const tx=(b.swoopTarget?.x||player.x)-cam.x, ty=(b.swoopTarget?.y||player.y)-cam.y;
    X.strokeStyle='#f4433688'; X.lineWidth=2; X.setLineDash([5,5]);
    X.beginPath(); X.arc(tx,ty,30,0,Math.PI*2); X.stroke();
    X.setLineDash([]);
  }
  if(b.state==='slam' && b.stateTimer>20){
    // ground impact warning
    X.fillStyle='#ff980044';
    X.fillRect(sx-60,sy+b.r,120,4);
  }
  if(b.state==='transition'){
    // phase transition glow
    const glow=Math.sin(tick*0.2)*10+20;
    X.strokeStyle='#ff980088'; X.lineWidth=3;
    X.beginPath(); X.arc(sx,sy,b.r+glow,0,Math.PI*2); X.stroke();
    X.fillStyle='#fff'; X.font='bold 16px Arial'; X.textAlign='center';
    X.fillText('ФАЗА '+(b.phase),sx,sy-b.r-20);
    X.textAlign='left';
  }

  // flash on hit
  if(b.flashTimer>0){
    X.fillStyle='#fff';
  } else {
    X.fillStyle=b.color;
  }

  // body
  X.beginPath(); X.arc(sx,sy,b.r,0,Math.PI*2); X.fill();

  // boss-specific drawing
  switch(b.type){
    case 'hrush':
      // horns
      X.strokeStyle='#3e2723'; X.lineWidth=5;
      X.beginPath(); X.moveTo(sx+b.facing*b.r,sy-5);
      X.lineTo(sx+b.facing*(b.r+20),sy-20); X.stroke();
      X.beginPath(); X.moveTo(sx+b.facing*b.r,sy+5);
      X.lineTo(sx+b.facing*(b.r+18),sy-8); X.stroke();
      if(b.phase===2){
        // wings
        X.fillStyle='rgba(139,90,43,0.5)';
        const wf=Math.sin(tick*0.2)*10;
        X.beginPath(); X.ellipse(sx-20,sy-b.r-wf,25,10,-.2,0,Math.PI*2); X.fill();
        X.beginPath(); X.ellipse(sx+20,sy-b.r-wf,25,10,.2,0,Math.PI*2); X.fill();
      }
      // belly (weak spot indicator during stun)
      if(b.state==='stunned'){
        X.fillStyle='#ffab91';
        X.beginPath(); X.arc(sx,sy+b.r*0.3,b.r*0.5,0,Math.PI*2); X.fill();
      }
      // shield indicator
      if(b.shieldFront){
        X.strokeStyle='#fdd835'; X.lineWidth=3;
        X.beginPath(); X.arc(sx+b.facing*b.r*0.3,sy,b.r+5,-Math.PI/3+b.facing*Math.PI/2,Math.PI/3+b.facing*Math.PI/2); X.stroke();
      }
      break;
    case 'charlotte':
      // crown
      X.fillStyle='#f44336';
      X.beginPath(); X.moveTo(sx-15,sy-b.r); X.lineTo(sx-10,sy-b.r-15);
      X.lineTo(sx,sy-b.r-5); X.lineTo(sx+10,sy-b.r-15);
      X.lineTo(sx+15,sy-b.r); X.closePath(); X.fill();
      // tail
      X.strokeStyle=b.color; X.lineWidth=4;
      X.beginPath(); X.moveTo(sx-b.facing*b.r,sy+5);
      X.quadraticCurveTo(sx-b.facing*(b.r+25),sy-10+Math.sin(tick*0.1)*10,
                         sx-b.facing*(b.r+20),sy-25); X.stroke();
      break;
    case 'karlusha':
      // beak
      X.fillStyle='#ff9800';
      X.beginPath(); X.moveTo(sx+b.facing*b.r,sy);
      X.lineTo(sx+b.facing*(b.r+16),sy+2);
      X.lineTo(sx+b.facing*b.r,sy+8); X.closePath(); X.fill();
      // armor
      X.strokeStyle='#546e7a'; X.lineWidth=2;
      X.beginPath(); X.arc(sx,sy,b.r+3,0,Math.PI*2); X.stroke();
      // wings
      X.fillStyle='#37474f';
      const wf2=Math.sin(tick*0.15)*8;
      X.beginPath(); X.ellipse(sx-15,sy-b.r+5-wf2,20,8,-.3,0,Math.PI*2); X.fill();
      X.beginPath(); X.ellipse(sx+15,sy-b.r+5-wf2,20,8,.3,0,Math.PI*2); X.fill();
      break;
    case 'worm':
      // segments
      for(let i=1;i<5;i++){
        X.fillStyle=darkenColor(b.color,i*5);
        X.beginPath(); X.arc(sx-i*20*b.facing+Math.sin(tick*0.05+i)*10, sy+i*8,b.r-i*5,0,Math.PI*2); X.fill();
      }
      if(b.phase===3){
        // exposed core
        X.fillStyle='#76ff03';
        X.beginPath(); X.arc(sx,sy,b.r*0.4,0,Math.PI*2); X.fill();
      }
      break;
    case 'nozhov':
      // exosuit details
      X.strokeStyle='#78909c'; X.lineWidth=3;
      X.beginPath(); X.arc(sx,sy,b.r+4,0,Math.PI*2); X.stroke();
      // machete
      if(b.phase===1){
        X.fillStyle='#b0bec5';
        X.save(); X.translate(sx+b.facing*b.r,sy-10);
        X.rotate(b.facing*0.3+Math.sin(tick*0.1)*0.2);
        X.fillRect(-3,-30,6,35); X.restore();
      }
      // head
      X.fillStyle='#ffcc80';
      X.beginPath(); X.arc(sx,sy-b.r*0.5,b.r*0.4,0,Math.PI*2); X.fill();
      break;
    case 'duval':
      // chef hat
      X.fillStyle='#fff';
      X.fillRect(sx-15,sy-b.r-25,30,25);
      X.beginPath(); X.arc(sx,sy-b.r-25,18,Math.PI,0); X.fill();
      if(b.phase>=2){
        // mechanical apron
        X.strokeStyle='#f44336'; X.lineWidth=2;
        X.beginPath(); X.arc(sx,sy+5,b.r-5,0.5,Math.PI-0.5); X.stroke();
      }
      if(b.phase===3){
        // mutated - bigger, blade arms
        X.fillStyle='#b71c1c';
        X.beginPath(); X.arc(sx,sy,b.r*0.3,0,Math.PI*2); X.fill();
        X.strokeStyle='#b0bec5'; X.lineWidth=4;
        const armA=Math.sin(tick*0.15)*0.5;
        X.beginPath(); X.moveTo(sx-b.r,sy);
        X.lineTo(sx-b.r-25,sy+Math.sin(armA)*20); X.stroke();
        X.beginPath(); X.moveTo(sx+b.r,sy);
        X.lineTo(sx+b.r+25,sy+Math.sin(-armA)*20); X.stroke();
      }
      // face
      X.fillStyle='#ffcc80';
      X.beginPath(); X.arc(sx,sy-b.r*0.3,b.r*0.35,0,Math.PI*2); X.fill();
      // mustache
      X.strokeStyle='#5d4037'; X.lineWidth=2;
      X.beginPath(); X.moveTo(sx-8,sy-b.r*0.15);
      X.quadraticCurveTo(sx-15,sy-b.r*0.25,sx-12,sy-b.r*0.35); X.stroke();
      X.beginPath(); X.moveTo(sx+8,sy-b.r*0.15);
      X.quadraticCurveTo(sx+15,sy-b.r*0.25,sx+12,sy-b.r*0.35); X.stroke();
      break;
  }

  // eyes
  X.fillStyle='#fff';
  X.beginPath(); X.arc(sx-b.r*0.25,sy-b.r*0.3,b.r*0.15,0,Math.PI*2); X.fill();
  X.beginPath(); X.arc(sx+b.r*0.25,sy-b.r*0.3,b.r*0.15,0,Math.PI*2); X.fill();
  X.fillStyle='#d50000';
  X.beginPath(); X.arc(sx-b.r*0.22,sy-b.r*0.28,b.r*0.07,0,Math.PI*2); X.fill();
  X.beginPath(); X.arc(sx+b.r*0.28,sy-b.r*0.28,b.r*0.07,0,Math.PI*2); X.fill();

  // HP bar (top of screen)
  const bw=400, bh=16, bx=CW/2-bw/2, by=20;
  X.fillStyle='#1a1a1a88';
  X.beginPath(); X.roundRect(bx-5,by-5,bw+10,bh+10,8); X.fill();
  X.fillStyle='#333';
  X.beginPath(); X.roundRect(bx,by,bw,bh,6); X.fill();
  const hpC = b.hp/b.maxHp>0.5?'#f44336':b.hp/b.maxHp>0.25?'#ff9800':'#d50000';
  X.fillStyle=hpC;
  X.beginPath(); X.roundRect(bx,by,bw*(b.hp/b.maxHp),bh,6); X.fill();
  X.fillStyle='#fff'; X.font='bold 12px Arial'; X.textAlign='center';
  X.fillText(b.name+' — Фаза '+b.phase,CW/2,by+12);
  X.textAlign='left';
}

// ── Level Validation ─────────────────────────────────────────
function validateLevels(){
  for(let act=1;act<=6;act++){
    const lvl=LEVELS[act];
    const grounds=lvl.platforms.filter(p=>p.h>=50).sort((a,b)=>a.x-b.x);
    for(let i=0;i<grounds.length-1;i++){
      const gap=grounds[i+1].x-(grounds[i].x+grounds[i].w);
      if(gap>10) console.warn('Act '+act+': ground gap of '+gap+'px at x='+(grounds[i].x+grounds[i].w));
    }
  }
}
validateLevels();

// ============================================================
//  LEVEL MANAGER
// ============================================================
function loadLevel(act){
  currentAct = act;
  const lvl = LEVELS[act];
  currentPlatforms = [...lvl.platforms];
  currentBoss = null;
  bossGate = false;
  enemies = [];
  projectiles = [];
  particles = [];
  drops = [];

  player.x = 200;
  player.y = 400;
  player.vx = 0;
  player.vy = 0;
  player.hp = player.maxHp;
  player.alive = true;
  player.invuln = 60;
  player.energy = Math.min(player.energy, ULT_COST);

  cam.x = 0; cam.y = 0;

  spawnLevelEnemies();

  // show intro cutscene
  if(lvl.intro){
    gs = 'cutscene';
    cutsceneData = lvl.intro;
    cutsceneIdx = 0;
    cutsceneTimer = 0;
  } else {
    gs = 'play';
  }
  SE.play('act'+act);
}

function checkBossTrigger(){
  const lvl = LEVELS[currentAct];
  if(!lvl.boss || currentBoss) return;
  if(player.x > lvl.bossGateX + 50){
    // spawn boss
    currentBoss = createBoss(lvl.boss.type, lvl.boss.x, lvl.boss.y);
    bossGate = true;
    // spawn arena walls
    if(lvl.arenaWalls) for(const w of lvl.arenaWalls) currentPlatforms.push({...w});
    gs = 'cutscene';
    cutsceneData = lvl.bossIntro;
    cutsceneIdx = 0;
    cutsceneTimer = 0;
    SE.play('boss');
  }
}

// ============================================================
//  BACKGROUND & DECORATIONS
// ============================================================
function drawBackground(){
  const lvl = LEVELS[currentAct];
  const g = X.createLinearGradient(0,0,0,CH);
  g.addColorStop(0, lvl.bgGradient[0]);
  g.addColorStop(0.6, lvl.bgGradient[1]);
  g.addColorStop(1, lvl.bgGradient[2]);
  X.fillStyle = g;
  X.fillRect(0,0,CW,CH);

  // parallax stars/dots
  X.fillStyle='#ffffff15';
  for(let i=0;i<40;i++){
    const sx=(i*137+currentAct*500)%CW - (cam.x*0.05)%CW;
    const sy=(i*89+currentAct*300)%CH;
    X.fillRect(sx,sy,2,2);
  }
}

function drawDecorations(){
  const lvl = LEVELS[currentAct];
  if(!lvl.decorations) return;

  for(const d of lvl.decorations){
    const sx=d.x-cam.x, sy=(d.y||560)-cam.y;
    if(sx<-100||sx>CW+100) continue;

    switch(d.type){
      case 'fence':
        X.strokeStyle='#8d6e63'; X.lineWidth=3;
        for(let i=0;i<(d.w||60);i+=15){
          X.beginPath(); X.moveTo(sx+i,sy); X.lineTo(sx+i,sy-25); X.stroke();
        }
        X.beginPath(); X.moveTo(sx,sy-20); X.lineTo(sx+(d.w||60),sy-20); X.stroke();
        X.beginPath(); X.moveTo(sx,sy-10); X.lineTo(sx+(d.w||60),sy-10); X.stroke();
        break;
      case 'tree':
        X.fillStyle='#5d4037'; X.fillRect(sx-5,sy-40,10,40);
        X.fillStyle='#2e7d32';
        X.beginPath(); X.arc(sx,sy-55,25,0,Math.PI*2); X.fill();
        X.fillStyle='#388e3c';
        X.beginPath(); X.arc(sx+8,sy-60,18,0,Math.PI*2); X.fill();
        break;
      case 'greenhouse':
        X.strokeStyle='#90a4ae'; X.lineWidth=2;
        X.strokeRect(sx,sy-60,120,60);
        X.beginPath(); X.moveTo(sx,sy-60); X.lineTo(sx+60,sy-90); X.lineTo(sx+120,sy-60); X.stroke();
        X.fillStyle='#e0f7fa22'; X.fillRect(sx+2,sy-58,116,56);
        break;
      case 'tractor':
        X.fillStyle='#f44336'; X.fillRect(sx,sy-30,60,30);
        X.fillStyle='#333'; X.beginPath(); X.arc(sx+15,sy,12,0,Math.PI*2); X.fill();
        X.beginPath(); X.arc(sx+50,sy,16,0,Math.PI*2); X.fill();
        X.fillStyle='#666'; X.beginPath(); X.arc(sx+15,sy,6,0,Math.PI*2); X.fill();
        X.beginPath(); X.arc(sx+50,sy,8,0,Math.PI*2); X.fill();
        break;
      case 'grass':
        X.strokeStyle='#4caf50'; X.lineWidth=2;
        for(let i=-8;i<=8;i+=4){
          const gh=10+((d.x+i*7)%8);
          const goff=((d.x+i*13)%5)-2;
          X.beginPath(); X.moveTo(sx+i,sy); X.lineTo(sx+i+goff,sy-gh); X.stroke();
        }
        break;
      case 'house':
        X.fillStyle='#78909c'; X.fillRect(sx,sy-70,80,70);
        X.fillStyle='#546e7a';
        X.beginPath(); X.moveTo(sx-5,sy-70); X.lineTo(sx+40,sy-100); X.lineTo(sx+85,sy-70); X.closePath(); X.fill();
        X.fillStyle='#fff176'; X.fillRect(sx+15,sy-50,20,20); X.fillRect(sx+45,sy-50,20,20);
        break;
      case 'lamp':
        X.strokeStyle='#78909c'; X.lineWidth=3;
        X.beginPath(); X.moveTo(sx,sy); X.lineTo(sx,sy-50); X.stroke();
        X.fillStyle='#fdd835'; X.beginPath(); X.arc(sx,sy-53,5,0,Math.PI*2); X.fill();
        X.fillStyle='#fdd83522'; X.beginPath(); X.arc(sx,sy-53,20,0,Math.PI*2); X.fill();
        break;
      case 'trash':
        X.fillStyle='#5d4037'; X.fillRect(sx,sy-20,30,20);
        X.fillStyle='#795548'; X.fillRect(sx+5,sy-25,20,5);
        break;
      case 'building':
        const bh2=100+(((d.x*7+13)%60)|0);
        X.fillStyle='#455a64'; X.fillRect(sx,sy-bh2,60,bh2);
        X.fillStyle='#fff17644';
        for(let r2=0;r2<bh2-20;r2+=25){
          for(let c=0;c<2;c++) X.fillRect(sx+10+c*25,sy-bh2+10+r2,15,15);
        }
        break;
      case 'factory':
        X.fillStyle='#5d4037'; X.fillRect(sx,sy-80,100,80);
        X.fillStyle='#4e342e'; X.fillRect(sx+30,sy-120,15,40);
        X.fillStyle='#797979'; X.fillRect(sx+27,sy-125,21,8);
        break;
      case 'pipe':
        X.strokeStyle='#78909c'; X.lineWidth=8;
        X.beginPath(); X.moveTo(sx,sy-20); X.lineTo(sx+60,sy-20); X.lineTo(sx+60,sy); X.stroke();
        break;
      case 'bunker':
        X.fillStyle='#455a64'; X.fillRect(sx,sy-30,70,30);
        X.fillStyle='#37474f';
        X.beginPath(); X.arc(sx+35,sy-30,35,Math.PI,0); X.fill();
        break;
      case 'sandbag':
        X.fillStyle='#8d6e63';
        for(let i=0;i<3;i++){
          X.beginPath(); X.ellipse(sx+i*20,sy-8,12,8,0,0,Math.PI*2); X.fill();
        }
        break;
      case 'table':
        X.fillStyle='#8d6e63'; X.fillRect(sx,sy-20,50,3);
        X.strokeStyle='#5d4037'; X.lineWidth=2;
        X.beginPath(); X.moveTo(sx+10,sy-17); X.lineTo(sx+10,sy); X.stroke();
        X.beginPath(); X.moveTo(sx+40,sy-17); X.lineTo(sx+40,sy); X.stroke();
        break;
      case 'chandelier':
        X.strokeStyle='#ffd54f'; X.lineWidth=1;
        X.beginPath(); X.moveTo(sx,sy-40); X.lineTo(sx,sy); X.stroke();
        X.fillStyle='#fdd835';
        for(let i=-2;i<=2;i++){
          X.beginPath(); X.arc(sx+i*8,sy,3,0,Math.PI*2); X.fill();
        }
        X.fillStyle='#fdd83522'; X.beginPath(); X.arc(sx,sy,15,0,Math.PI*2); X.fill();
        break;
    }
  }
}

function drawPlatforms(){
  const lvl = LEVELS[currentAct];
  for(const p of currentPlatforms){
    const sx=p.x-cam.x, sy=p.y-cam.y;
    if(sx+p.w<-10||sx>CW+10||sy+p.h<-10||sy>CH+10) continue;

    if(p.h>100){
      // wall
      X.fillStyle = darkenColor(lvl.groundColor,10);
      X.fillRect(sx,sy,p.w,p.h);
      X.fillStyle = darkenColor(lvl.groundColor,20);
      X.fillRect(sx,sy,p.w,3);
    } else if(p.h<20){
      // floating platform
      X.fillStyle = '#78909c';
      X.beginPath(); X.roundRect(sx,sy,p.w,p.h,4); X.fill();
      X.fillStyle = '#90a4ae';
      X.fillRect(sx+2,sy+2,p.w-4,3);
    } else {
      // ground
      X.fillStyle = lvl.groundColor;
      X.fillRect(sx,sy,p.w,p.h);
      // grass top
      X.fillStyle = '#4caf50';
      X.fillRect(sx,sy,p.w,4);
      // texture
      X.fillStyle = darkenColor(lvl.groundColor,8);
      for(let i=0;i<p.w;i+=20){
        const hash=((p.x+i)*73+p.y*37)%17;
        X.fillRect(sx+i+(hash%5),sy+10+(hash%10),3,3);
      }
    }
  }

  // Boss gate
  if(bossGate){
    const gx = LEVELS[currentAct].bossGateX - cam.x;
    X.fillStyle='#f44336'; X.fillRect(gx,200-cam.y,30,380);
    X.fillStyle='#d32f2f';
    for(let i=0;i<380;i+=20) X.fillRect(gx+5,(200+i)-cam.y,20,3);
  }
}

// ============================================================
//  HUD
// ============================================================
function drawHUD(){
  // Health bar
  const bw=220, bh=18, bx=15, by=15;
  X.fillStyle='#1a1a1a99';
  X.beginPath(); X.roundRect(bx-5,by-5,bw+10,bh+10,8); X.fill();
  X.fillStyle='#333';
  X.beginPath(); X.roundRect(bx,by,bw,bh,6); X.fill();
  const hpR=player.hp/player.maxHp;
  X.fillStyle=hpR>0.5?'#4caf50':hpR>0.25?'#ffc107':'#ef5350';
  X.beginPath(); X.roundRect(bx,by,bw*hpR,bh,6); X.fill();
  X.fillStyle='#fff'; X.font='bold 11px Arial';
  X.fillText('❤️ '+player.hp+'/'+player.maxHp, bx+8, by+13);

  // Energy bar
  const eby=by+bh+12;
  X.fillStyle='#1a1a1a99';
  X.beginPath(); X.roundRect(bx-5,eby-5,bw+10,12+10,8); X.fill();
  X.fillStyle='#333';
  X.beginPath(); X.roundRect(bx,eby,bw,12,6); X.fill();
  X.fillStyle='#ffab00';
  X.beginPath(); X.roundRect(bx,eby,bw*(player.energy/ULT_COST),12,6); X.fill();
  X.fillStyle='#fff'; X.font='bold 10px Arial';
  X.fillText('⚡ '+(player.energy>=ULT_COST?'ГОТОВО [E]':Math.floor(player.energy)+'/'+ULT_COST), bx+8, eby+9);

  // Seeds
  X.fillStyle='#ffd54f'; X.font='bold 14px Arial';
  X.fillText('🌰 '+totalSeeds, bx, eby+30);

  // Dash cooldown
  const dashPct = 1 - player.dashCd/DASH_CD;
  if(dashPct<1){
    X.fillStyle='#80deea88'; X.font='11px Arial';
    X.fillText('Дэш: '+Math.ceil(player.dashCd/60*10)/10+'с', bx, eby+48);
  } else {
    X.fillStyle='#80deea'; X.font='11px Arial';
    X.fillText('Дэш: ✓ [Shift]', bx, eby+48);
  }

  // Act info
  X.fillStyle='#ffffff88'; X.font='bold 13px Arial'; X.textAlign='right';
  X.fillText('Акт '+currentAct+': '+LEVELS[currentAct].name, CW-15, 28);
  X.textAlign='left';

  // Captured territories
  if(capturedTerritories.length>0){
    X.fillStyle='#4caf5088'; X.font='10px Arial';
    X.fillText('🌱 Захвачено: '+capturedTerritories.length+'/6 (+'+capturedTerritories.length*3+' семечек/5с)', bx, eby+64);
  }

  // Mutations
  if(mutations.length>0){
    X.fillStyle='#ce93d8'; X.font='10px Arial';
    const mutY = capturedTerritories.length>0 ? eby+78 : eby+64;
    X.fillText('Мутации: '+mutations.join(', '), bx, mutY);
  }

  // Enemy count
  const aliveEnemies = enemies.filter(e=>e.alive).length;
  if(aliveEnemies>0){
    X.fillStyle='#ef535088'; X.font='11px Arial'; X.textAlign='right';
    X.fillText('Враги: '+aliveEnemies, CW-15, 48);
    X.textAlign='left';
  }
}

// ============================================================
//  CUTSCENE SYSTEM
// ============================================================
function drawCutscene(){
  X.fillStyle='#000000cc';
  X.fillRect(0,0,CW,CH);

  // cinematic bars
  X.fillStyle='#000';
  X.fillRect(0,0,CW,60);
  X.fillRect(0,CH-60,CW,60);

  if(!cutsceneData||!cutsceneData[cutsceneIdx]) return;

  const line=cutsceneData[cutsceneIdx];
  const boxH=120;
  const boxY=CH-60-boxH-20;
  X.fillStyle='#1a1a2eee';
  X.beginPath(); X.roundRect(40,boxY,CW-80,boxH,12); X.fill();
  X.strokeStyle='#4caf50'; X.lineWidth=2;
  X.beginPath(); X.roundRect(40,boxY,CW-80,boxH,12); X.stroke();

  if(line.speaker){
    X.fillStyle='#4caf50'; X.font='bold 16px Arial';
    X.fillText(line.speaker, 70, boxY+28);
  }

  X.fillStyle='#eee'; X.font='15px Arial';
  wrapText(line.text, 70, boxY+(line.speaker?52:30), CW-140, 22);

  // prompt
  X.fillStyle='#ffffff55'; X.font='12px Arial'; X.textAlign='center';
  X.fillText('Нажмите любую клавишу или кликните...', CW/2, boxY+boxH-10);
  X.textAlign='left';
}

function wrapText(text,x,y,maxW,lineH){
  const words=text.split(' ');
  let line='';
  for(const w of words){
    const test=line+w+' ';
    if(X.measureText(test).width>maxW && line){
      X.fillText(line,x,y);
      line=w+' '; y+=lineH;
    } else {
      line=test;
    }
  }
  X.fillText(line,x,y);
}

function advanceCutscene(){
  cutsceneIdx++;
  if(!cutsceneData||cutsceneIdx>=cutsceneData.length){
    cutsceneData=null;
    cutsceneIdx=0;
    if(cutsceneNextState){ gs=cutsceneNextState; cutsceneNextState=null; }
    else if(currentBoss && currentBoss.alive) gs='boss';
    else gs='play';
  }
}

// cutscene input
addEventListener('keydown', e => {
  if(gs==='cutscene') advanceCutscene();
});
addEventListener('click', e => {
  if(gs==='cutscene') advanceCutscene();
});

// ============================================================
//  UPGRADE SCREEN
// ============================================================
function drawUpgrade(){
  X.fillStyle='#0a0a14ee';
  X.fillRect(0,0,CW,CH);

  X.fillStyle='#4caf50'; X.font='bold 32px Arial'; X.textAlign='center';
  X.fillText('🌱 Дерево Семечек — Прокачка', CW/2, 60);

  X.fillStyle='#ffd54f'; X.font='18px Arial';
  X.fillText('Семечки: '+totalSeeds, CW/2, 95);

  const stats = [
    {key:'hp', name:'❤️ Здоровье', desc:'+20 HP'},
    {key:'speed', name:'💨 Скорость', desc:'+0.5'},
    {key:'damage', name:'⚔️ Урон', desc:'+0.5'},
    {key:'range', name:'🎯 Дальность', desc:'+1'},
    {key:'atkSpd', name:'⚡ Скорость атаки', desc:'-2 кд'},
  ];

  const startY = 140;
  upgradeButtons = [];

  for(let i=0;i<stats.length;i++){
    const s=stats[i];
    const y=startY+i*70;
    const level=upgrades[s.key];
    const cost=level<UPG_MAX?UPG_COST[level]:'MAX';
    const canBuy=level<UPG_MAX&&totalSeeds>=UPG_COST[level];

    // box
    X.fillStyle=canBuy?'#1b5e2044':'#33333344';
    X.beginPath(); X.roundRect(CW/2-250,y,500,55,8); X.fill();
    X.strokeStyle=canBuy?'#4caf50':'#555';
    X.lineWidth=1;
    X.beginPath(); X.roundRect(CW/2-250,y,500,55,8); X.stroke();

    // name
    X.fillStyle='#fff'; X.font='bold 16px Arial'; X.textAlign='left';
    X.fillText(s.name+' ('+s.desc+')', CW/2-230, y+25);

    // level bar
    for(let j=0;j<UPG_MAX;j++){
      X.fillStyle=j<level?'#4caf50':'#333';
      X.fillRect(CW/2-230+j*22, y+35, 18, 8);
    }

    // cost
    X.fillStyle=canBuy?'#ffd54f':'#777'; X.textAlign='right'; X.font='14px Arial';
    X.fillText(typeof cost==='number'?'🌰 '+cost:'MAX', CW/2+230, y+30);

    upgradeButtons.push({x:CW/2-250,y,w:500,h:55,key:s.key,canBuy});
  }

  X.textAlign='center';

  // Next Act button
  const ny=startY+stats.length*70+20;
  X.fillStyle='#ff6f00'; X.beginPath(); X.roundRect(CW/2-100,ny,200,50,10); X.fill();
  X.fillStyle='#fff'; X.font='bold 18px Arial';
  X.fillText('Следующий Акт ➜', CW/2, ny+32);
  upgradeNextBtn = {x:CW/2-100,y:ny,w:200,h:50};

  // Territory info
  let infoY = ny+70;
  if(capturedTerritories.length>0){
    X.fillStyle='#4caf50'; X.font='14px Arial';
    X.fillText('🌱 Захваченные территории: '+capturedTerritories.map(a=>LEVELS[a].name).join(', '), CW/2, infoY);
    X.fillStyle='#a5d6a7'; X.font='12px Arial';
    X.fillText('Пассивный доход: +'+capturedTerritories.length*3+' семечек каждые 5 секунд', CW/2, infoY+22);
    infoY+=50;
  }

  // Mutations display
  if(mutations.length>0){
    X.fillStyle='#ce93d8'; X.font='14px Arial';
    X.fillText('Мутации: '+mutations.join(', '), CW/2, infoY);
  }

  X.textAlign='left';
}

let upgradeButtons=[];
let upgradeNextBtn=null;

addEventListener('click', e=>{
  if(gs!=='upgrade') return;
  const mx=e.clientX, my=e.clientY;

  for(const b of upgradeButtons){
    if(mx>b.x&&mx<b.x+b.w&&my>b.y&&my<b.y+b.h&&b.canBuy){
      const cost=UPG_COST[upgrades[b.key]];
      totalSeeds-=cost;
      upgrades[b.key]++;
      // apply upgrades
      player.maxHp=100+upgrades.hp*20;
      player.hp=player.maxHp;
      player.speed=PLAYER_SPEED+upgrades.speed*0.5;
      player.damage=1+upgrades.damage*0.5;
      player.range=SEED_SPEED+upgrades.range*1;
      player.atkRate=18-upgrades.atkSpd*2;
      sfxPickup();
      return;
    }
  }

  if(upgradeNextBtn && mx>upgradeNextBtn.x&&mx<upgradeNextBtn.x+upgradeNextBtn.w&&my>upgradeNextBtn.y&&my<upgradeNextBtn.y+upgradeNextBtn.h){
    if(currentAct<6){
      loadLevel(currentAct+1);
    }
  }
});

// ============================================================
//  GAMEOVER / VICTORY
// ============================================================
function drawGameOver(){
  X.fillStyle='#000000cc';
  X.fillRect(0,0,CW,CH);
  X.fillStyle='#ef5350'; X.font='bold 48px Arial'; X.textAlign='center';
  X.fillText('💀 АРБУЗ ПОГИБ!', CW/2, CH/2-40);
  X.fillStyle='#fff'; X.font='20px Arial';
  X.fillText('Акт '+currentAct+': '+LEVELS[currentAct].name, CW/2, CH/2+10);
  X.fillStyle='#ffd54f'; X.font='16px Arial';
  X.fillText('Семечек собрано: '+totalSeeds, CW/2, CH/2+45);
  X.fillStyle='#80cbc4'; X.font='14px Arial';
  X.fillText('Нажмите R для перезапуска акта или Escape для меню', CW/2, CH/2+80);
  X.textAlign='left';
}

function drawVictory(){
  X.fillStyle='#000000cc';
  X.fillRect(0,0,CW,CH);

  const pulse=Math.sin(tick*0.05)*0.1+0.9;
  X.fillStyle='#4caf50'; X.font=`bold ${48*pulse}px Arial`; X.textAlign='center';
  X.fillText('🍉 ПОБЕДА! 🍉', CW/2, CH/2-80);

  X.fillStyle='#fff'; X.font='18px Arial';
  const lines=[
    'Мир принадлежит Арбузилле.',
    'От бахчи до горизонта — всё зелено.',
    '',
    'Но это лишь начало...',
    'Дынная Империя на востоке. Тыквенный Альянс на севере.',
    'Война за урожай только начинается.',
    '',
    'КОНЕЦ ПЕРВОГО СЕЗОНА. Продолжение следует...',
  ];
  for(let i=0;i<lines.length;i++){
    X.fillText(lines[i], CW/2, CH/2-30+i*28);
  }

  X.fillStyle='#ffd54f'; X.font='14px Arial';
  X.fillText('Нажмите Escape для меню', CW/2, CH-40);
  X.textAlign='left';
}

// ============================================================
//  MENU
// ============================================================
document.getElementById('btn-start').addEventListener('click', ()=>{
  SE.init();
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('menu').style.display='none';
  // reset game
  totalSeeds=0;
  doubleJumpUnlocked=false;
  mutations=[];
  capturedTerritories=[];
  passiveTimer=0;
  cutsceneNextState=null;
  upgrades={hp:0,speed:0,damage:0,range:0,atkSpd:0};
  initPlayer();
  loadLevel(1);
});

addEventListener('keydown', e=>{
  if(gs==='gameover' && e.code==='KeyR'){
    initPlayer();
    player.maxHp=100+upgrades.hp*20;
    player.hp=player.maxHp;
    player.speed=PLAYER_SPEED+upgrades.speed*0.5;
    player.damage=1+upgrades.damage*0.5;
    player.range=SEED_SPEED+upgrades.range*1;
    player.atkRate=18-upgrades.atkSpd*2;
    loadLevel(currentAct);
  }
  if((gs==='gameover'||gs==='victory')&&e.code==='Escape'){
    document.getElementById('overlay').classList.add('active');
    document.getElementById('menu').style.display='block';
    gs='menu';
    SE.play('menu');
  }
});

// ============================================================
//  MAIN GAME LOOP
// ============================================================
function update(){
  tick++;
  if(shakeDur>0){shakeDur--;shakeX*=0.9;shakeY*=0.9;}else{shakeX=0;shakeY=0;}

  if(gs==='play'){
    updatePlayer();
    updateEnemies();
    updateProjectiles();
    updateParticles();
    updateDrops();
    updateCamera();
    checkBossTrigger();
    // clean dead enemies
    enemies=enemies.filter(e=>e.alive);
    // passive income from captured territories
    updatePassiveIncome();
  }
  if(gs==='boss'){
    updatePlayer();
    updateEnemies();
    updateBoss();
    updateProjectiles();
    updateParticles();
    updateDrops();
    updateCamera();
    enemies=enemies.filter(e=>e.alive);
    updatePassiveIncome();
  }
  if(gs==='gameover'||gs==='victory'){
    updateParticles();
  }
}

function updatePassiveIncome(){
  if(capturedTerritories.length===0) return;
  passiveTimer++;
  if(passiveTimer>=300){ // every 5 seconds
    passiveTimer=0;
    passiveIncome=capturedTerritories.length*3;
    totalSeeds+=passiveIncome;
  }
}

function draw(){
  X.clearRect(0,0,CW,CH);

  if(gs==='menu'){
    // draw animated watermelon on canvas behind menu
    X.fillStyle='#0a0a14'; X.fillRect(0,0,CW,CH);
    // floating watermelons
    for(let i=0;i<8;i++){
      const mx=CW/2+Math.sin(tick*0.01+i*1.5)*CW*0.35;
      const my=CH/2+Math.cos(tick*0.012+i*2)*CH*0.3;
      const mr=20+Math.sin(tick*0.02+i)*5;
      X.globalAlpha=0.15;
      X.fillStyle='#388e3c';
      X.beginPath(); X.arc(mx,my,mr,0,Math.PI*2); X.fill();
      X.fillStyle='#e53935';
      X.beginPath(); X.arc(mx,my,mr*0.7,0,Math.PI*2); X.fill();
    }
    X.globalAlpha=1;
    return;
  }

  X.save();
  X.translate(shakeX, shakeY);

  drawBackground();

  X.save();
  // no additional translation needed, cam offset handled in individual draw calls

  drawDecorations();
  drawPlatforms();
  drawDrops();
  drawEnemies();
  if(gs==='boss'||currentBoss) drawBoss();
  drawProjectiles();
  drawPlayer();
  drawParticles();

  X.restore();

  drawHUD();

  X.restore();

  if(gs==='cutscene') drawCutscene();
  if(gs==='upgrade') drawUpgrade();
  if(gs==='gameover') drawGameOver();
  if(gs==='victory') drawVictory();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
