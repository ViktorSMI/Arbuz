<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍉 Арбуз Симулятор</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #eee;
      user-select: none;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #f7c948;
      text-shadow: 0 0 12px #f7c94888;
      letter-spacing: 2px;
    }

    #game-wrap {
      position: relative;
      border: 3px solid #4caf50;
      border-radius: 12px;
      box-shadow: 0 0 30px #4caf5066;
    }

    canvas {
      display: block;
      border-radius: 10px;
    }

    #ui {
      display: flex;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 10px 22px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 0.5px;
    }

    button:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 4px 16px #0006;
    }

    button:active:not(:disabled) { transform: scale(0.97); }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #btn-hands  { background: #ff7043; color: #fff; }
    #btn-legs   { background: #42a5f5; color: #fff; }
    #btn-conquer{ background: #ab47bc; color: #fff; }
    #btn-restart{ background: #26a69a; color: #fff; }

    #status {
      margin-top: 10px;
      font-size: 1rem;
      color: #aef;
      min-height: 1.4em;
      text-align: center;
    }

    #controls {
      margin-top: 6px;
      font-size: 0.82rem;
      color: #889;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>🍉 Арбуз Симулятор</h1>

<div id="game-wrap">
  <canvas id="canvas" width="700" height="500"></canvas>
</div>

<div id="ui">
  <button id="btn-hands"  >🤲 Создать руки</button>
  <button id="btn-legs"   >🦵 Создать ноги</button>
  <button id="btn-conquer" disabled>⚔️ Захватить мир!</button>
  <button id="btn-restart" style="display:none">🔄 Заново</button>
</div>

<div id="status">Создай себе руки и ноги, чтобы начать!</div>
<div id="controls">Движение: WASD / ←↑↓→ &nbsp;|&nbsp; Атака: Пробел / Клик</div>

<script>
// ─────────────────────────────────────────────────────────────
//  Арбуз Симулятор  –  canvas game logic
// ─────────────────────────────────────────────────────────────

const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const btnHands   = document.getElementById('btn-hands');
const btnLegs    = document.getElementById('btn-legs');
const btnConquer = document.getElementById('btn-conquer');
const btnRestart = document.getElementById('btn-restart');
const statusEl   = document.getElementById('status');

// ── roundRect polyfill for older browsers ─────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    const rad = Math.min(r, w / 2, h / 2);
    this.beginPath();
    this.moveTo(x + rad, y);
    this.lineTo(x + w - rad, y);
    this.quadraticCurveTo(x + w, y, x + w, y + rad);
    this.lineTo(x + w, y + h - rad);
    this.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
    this.lineTo(x + rad, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - rad);
    this.lineTo(x, y + rad);
    this.quadraticCurveTo(x, y, x + rad, y);
    this.closePath();
  };
}

// ── Game state ────────────────────────────────────────────────
let state = 'build';   // 'build' | 'play' | 'win' | 'dead'

const player = {
  x: W / 2, y: H / 2,
  r: 36,
  vx: 0, vy: 0,
  speed: 3,
  hp: 100,
  maxHp: 100,
  hasHands: false,
  hasLegs: false,
  attackCd: 0,
  attackRadius: 90,
  score: 0,
};

let parasites = [];
let particles = [];
let worldTiles = [];   // conquered world segments
let wave = 0;
let waveTimer = 0;
let totalKills = 0;
const KILLS_TO_WIN = 30;

const keys = {};

// ── Helpers ───────────────────────────────────────────────────
function rand(a, b) { return a + Math.random() * (b - a); }
function dist(a, b)  { return Math.hypot(a.x - b.x, a.y - b.y); }

function spawnParasiteFromEdge() {
  const side = Math.floor(rand(0, 4));
  let x, y;
  if (side === 0) { x = rand(0, W); y = -20; }
  else if (side === 1) { x = W + 20; y = rand(0, H); }
  else if (side === 2) { x = rand(0, W); y = H + 20; }
  else { x = -20; y = rand(0, H); }

  const speed = Math.min(rand(0.6, 1.4) + wave * 0.05, 3.5);
  parasites.push({
    x, y,
    r: rand(8, 14),
    speed,
    hp: 1 + Math.floor(wave / 3),
    maxHp: 1 + Math.floor(wave / 3),
    // worm body segments
    body: Array.from({ length: 8 }, () => ({ x, y })),
    angle: 0,
    eat: 0,        // eating cooldown
    color: `hsl(${rand(60,130)},70%,45%)`,
  });
}

function spawnWave() {
  wave++;
  const count = 3 + wave * 2;
  for (let i = 0; i < count; i++) spawnParasiteFromEdge();
}

function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = rand(0, Math.PI * 2);
    const spd   = rand(1.5, 5);
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: rand(20, 40),
      maxLife: 40,
      r: rand(2, 5),
      color,
    });
  }
}

function spawnWorldTile(x, y) {
  worldTiles.push({
    x: x + rand(-20, 20),
    y: y + rand(-20, 20),
    r: rand(12, 22),
    alpha: 0,
    grow: true,
  });
}

// ── Input ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if ((e.code === 'Space') && state === 'play') {
    e.preventDefault();
    doAttack();
  }
});
document.addEventListener('keyup',  e => { keys[e.code] = false; });

canvas.addEventListener('click', e => {
  if (state !== 'play') return;
  doAttack();
});

function doAttack() {
  if (player.attackCd > 0 || !player.hasHands) return;
  player.attackCd = 45;

  let hit = false;
  parasites.forEach(p => {
    if (dist(player, p) < player.attackRadius + p.r) {
      p.hp--;
      spawnParticles(p.x, p.y, '#ffe082', 5);
      hit = true;
      if (p.hp <= 0) {
        spawnParticles(p.x, p.y, p.color, 14);
        spawnWorldTile(p.x, p.y);
        player.score++;
        totalKills++;
        p.dead = true;
      }
    }
  });
  parasites = parasites.filter(p => !p.dead);
}

// ── Buttons ───────────────────────────────────────────────────
btnHands.addEventListener('click', () => {
  if (player.hasHands) return;
  player.hasHands = true;
  btnHands.disabled = true;
  spawnParticles(player.x, player.y - player.r, '#ff7043', 12);
  updateBuildStatus();
});

btnLegs.addEventListener('click', () => {
  if (player.hasLegs) return;
  player.hasLegs = true;
  btnLegs.disabled = true;
  spawnParticles(player.x, player.y + player.r, '#42a5f5', 12);
  updateBuildStatus();
});

btnConquer.addEventListener('click', () => {
  if (state !== 'build') return;
  state = 'play';
  btnConquer.disabled = true;
  btnConquer.style.display = 'none';
  statusEl.textContent = `Волна ${wave + 1}! Уничтожь паразитов!`;
  spawnWave();
});

btnRestart.addEventListener('click', () => {
  location.reload();
});

function updateBuildStatus() {
  if (player.hasHands && player.hasLegs) {
    btnConquer.disabled = false;
    statusEl.textContent = '✅ Готово! Нажми «Захватить мир!» чтобы начать!';
  } else if (player.hasHands) {
    statusEl.textContent = '✅ Руки созданы! Теперь создай ноги.';
  } else if (player.hasLegs) {
    statusEl.textContent = '✅ Ноги созданы! Теперь создай руки.';
  }
}

// ── Update ────────────────────────────────────────────────────
function update() {
  if (state === 'play') updatePlay();
  updateParticles();
  updateWorldTiles();
}

function updatePlay() {
  // Movement (only with legs)
  if (player.hasLegs) {
    if (keys['ArrowLeft']  || keys['KeyA']) player.vx -= 0.6;
    if (keys['ArrowRight'] || keys['KeyD']) player.vx += 0.6;
    if (keys['ArrowUp']    || keys['KeyW']) player.vy -= 0.6;
    if (keys['ArrowDown']  || keys['KeyS']) player.vy += 0.6;
  }

  player.vx *= 0.82;
  player.vy *= 0.82;

  const spd = player.speed * (player.hasLegs ? 1 : 0.35);
  const mag = Math.hypot(player.vx, player.vy);
  if (mag > spd) {
    player.vx = (player.vx / mag) * spd;
    player.vy = (player.vy / mag) * spd;
  }

  player.x = Math.max(player.r, Math.min(W - player.r, player.x + player.vx));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y + player.vy));

  if (player.attackCd > 0) player.attackCd--;

  // Parasites update
  parasites.forEach(p => {
    // Move toward player
    const angle = Math.atan2(player.y - p.y, player.x - p.x);
    p.angle = angle;
    p.x += Math.cos(angle) * p.speed;
    p.y += Math.sin(angle) * p.speed;

    // Update worm body
    p.body.unshift({ x: p.x, y: p.y });
    if (p.body.length > 8) p.body.pop();

    // Eat player
    if (dist(player, p) < player.r + p.r) {
      p.eat++;
      if (p.eat > 0 && p.eat % 30 === 0) {
        player.hp -= 5;
        spawnParticles(player.x, player.y, '#ef5350', 6);
      }
    } else {
      p.eat = 0;
    }
  });

  // Wave spawning
  waveTimer++;
  if (parasites.length === 0 && waveTimer > 60) {
    if (totalKills >= KILLS_TO_WIN) {
      state = 'win';
      statusEl.textContent = '🏆 МИР ЗАХВАЧЕН! Арбуз победил!';
      btnRestart.style.display = 'inline-block';
      return;
    }
    waveTimer = 0;
    statusEl.textContent = `🌊 Волна ${wave + 1}! Уничтожь паразитов!`;
    spawnWave();
  }

  if (player.hp <= 0) {
    player.hp = 0;
    state = 'dead';
    statusEl.textContent = '💀 Паразиты съели арбуз! Игра окончена.';
    btnRestart.style.display = 'inline-block';
    spawnParticles(player.x, player.y, '#4caf50', 30);
  }

  // Status during wave
  if (state === 'play') {
    statusEl.textContent =
      `🌊 Волна ${wave} | ☠️ Убито: ${totalKills}/${KILLS_TO_WIN} | 🍉 Паразитов: ${parasites.length}`;
  }
}

function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.9; p.vy *= 0.9;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);
}

function updateWorldTiles() {
  worldTiles.forEach(t => {
    if (t.grow) {
      t.alpha += 0.04;
      if (t.alpha >= 0.55) { t.alpha = 0.55; t.grow = false; }
    }
  });
}

// ── Draw ──────────────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  drawGrid();
  drawWorldTiles();
  drawParticles();
  drawParasites();
  drawPlayer();
  drawHUD();

  if (state === 'win') drawWinOverlay();
  if (state === 'dead') drawDeadOverlay();
}

function drawGrid() {
  ctx.strokeStyle = '#ffffff08';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawWorldTiles() {
  worldTiles.forEach(t => {
    ctx.globalAlpha = t.alpha;
    ctx.fillStyle = '#ab47bc';
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawParasites() {
  parasites.forEach(p => {
    // Draw worm body segments
    const segCount = p.body.length;
    for (let i = segCount - 1; i >= 0; i--) {
      const seg = p.body[i];
      const t = i / segCount;
      const segR = p.r * (0.45 + 0.55 * (1 - i / segCount));
      ctx.globalAlpha = 0.85;
      ctx.fillStyle = i === 0 ? darken(p.color, 20) : p.color;
      ctx.beginPath();
      ctx.arc(seg.x, seg.y, segR, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Eyes on head
    const ex = p.x + Math.cos(p.angle) * p.r * 0.5;
    const ey = p.y + Math.sin(p.angle) * p.r * 0.5;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ex, ey, p.r * 0.25, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(ex + Math.cos(p.angle) * 1.5, ey + Math.sin(p.angle) * 1.5, p.r * 0.12, 0, Math.PI * 2); ctx.fill();

    // HP bar
    if (p.maxHp > 1) {
      const bw = p.r * 2.5;
      const bx = p.x - bw / 2;
      const by = p.y - p.r - 8;
      ctx.fillStyle = '#333';
      ctx.fillRect(bx, by, bw, 4);
      ctx.fillStyle = '#ef5350';
      ctx.fillRect(bx, by, bw * (p.hp / p.maxHp), 4);
    }
  });
}

function drawPlayer() {
  const { x, y, r, hasHands, hasLegs, attackCd } = player;

  // Attack ring
  if (attackCd > 0 && hasHands) {
    ctx.globalAlpha = attackCd / 45 * 0.35;
    ctx.strokeStyle = '#ffe082';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(x, y, player.attackRadius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // ── Legs ──
  if (hasLegs) {
    ctx.strokeStyle = '#42a5f5';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    const legWobble = Math.sin(Date.now() / 150) * 5;
    // Left leg
    ctx.beginPath();
    ctx.moveTo(x - r * 0.4, y + r * 0.7);
    ctx.lineTo(x - r * 0.6, y + r * 1.5 + legWobble);
    ctx.lineTo(x - r * 0.9, y + r * 1.5 + legWobble);
    ctx.stroke();
    // Right leg
    ctx.beginPath();
    ctx.moveTo(x + r * 0.4, y + r * 0.7);
    ctx.lineTo(x + r * 0.6, y + r * 1.5 - legWobble);
    ctx.lineTo(x + r * 0.9, y + r * 1.5 - legWobble);
    ctx.stroke();
  }

  // ── Body (watermelon) ──
  // Outer green rind
  ctx.fillStyle = '#388e3c';
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();

  // Lighter green stripes
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.clip();
  ctx.strokeStyle = '#4caf5066';
  ctx.lineWidth = 4;
  for (let i = -r; i <= r; i += 10) {
    ctx.beginPath();
    ctx.moveTo(x + i, y - r);
    ctx.lineTo(x + i, y + r);
    ctx.stroke();
  }
  ctx.restore();

  // Inner red flesh
  ctx.fillStyle = '#e53935';
  ctx.beginPath();
  ctx.arc(x, y, r * 0.75, 0, Math.PI * 2);
  ctx.fill();

  // Seeds
  ctx.fillStyle = '#1a1a1a';
  const seeds = [
    [-0.25, -0.15], [0.2, -0.2], [0, 0.1],
    [-0.15, 0.25], [0.3, 0.15],
  ];
  seeds.forEach(([sx, sy]) => {
    ctx.beginPath();
    ctx.ellipse(x + sx * r, y + sy * r, r * 0.065, r * 0.13, sx * 1.2, 0, Math.PI * 2);
    ctx.fill();
  });

  // ── Hands/Arms ──
  if (hasHands) {
    ctx.strokeStyle = '#ff7043';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    const armSwing = Math.sin(Date.now() / 200) * 8;
    // Left arm
    ctx.beginPath();
    ctx.moveTo(x - r * 0.85, y - r * 0.1);
    ctx.lineTo(x - r * 1.7, y - r * 0.3 + armSwing);
    ctx.stroke();
    ctx.fillStyle = '#ff7043';
    ctx.beginPath();
    ctx.arc(x - r * 1.7, y - r * 0.3 + armSwing, 7, 0, Math.PI * 2);
    ctx.fill();
    // Right arm
    ctx.beginPath();
    ctx.moveTo(x + r * 0.85, y - r * 0.1);
    ctx.lineTo(x + r * 1.7, y - r * 0.3 - armSwing);
    ctx.stroke();
    ctx.fillStyle = '#ff7043';
    ctx.beginPath();
    ctx.arc(x + r * 1.7, y - r * 0.3 - armSwing, 7, 0, Math.PI * 2);
    ctx.fill();
  }

  // Face
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x - r * 0.28, y - r * 0.15, r * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + r * 0.28, y - r * 0.15, r * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(x - r * 0.24, y - r * 0.12, r * 0.09, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + r * 0.32, y - r * 0.12, r * 0.09, 0, Math.PI * 2); ctx.fill();

  // Mouth
  if (state === 'dead') {
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x - r * 0.25, y + r * 0.25);
    ctx.quadraticCurveTo(x, y + r * 0.15, x + r * 0.25, y + r * 0.25);
    ctx.stroke();
  } else {
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y + r * 0.1, r * 0.22, 0.2, Math.PI - 0.2);
    ctx.stroke();
  }
}

function drawHUD() {
  if (state === 'build') return;

  // HP bar
  const bw = 200, bh = 14;
  const bx = 10, by = 10;
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 6); ctx.fill();
  const hpRatio = player.hp / player.maxHp;
  ctx.fillStyle = hpRatio > 0.5 ? '#4caf50' : hpRatio > 0.25 ? '#ffc107' : '#ef5350';
  ctx.beginPath(); ctx.roundRect(bx, by, bw * hpRatio, bh, 6); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px Arial';
  ctx.fillText(`HP: ${player.hp}/${player.maxHp}`, bx + 5, by + 10);

  // Score
  ctx.fillStyle = '#ffe082';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(`⚔️ ${totalKills}/${KILLS_TO_WIN}`, W - 10, 24);
  ctx.textAlign = 'left';

  // Attack cooldown hint
  if (player.hasHands && player.attackCd > 0) {
    ctx.fillStyle = '#aaaaaa88';
    ctx.font = '11px Arial';
    ctx.fillText('⏳ Атака перезаряжается...', 10, H - 10);
  } else if (player.hasHands) {
    ctx.fillStyle = '#ffe08288';
    ctx.font = '11px Arial';
    ctx.fillText('Пробел / Клик — Атаковать', 10, H - 10);
  }
}

function drawWinOverlay() {
  ctx.fillStyle = '#00000099';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffe082';
  ctx.font = 'bold 52px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('🏆 МИР ЗАХВАЧЕН! 🏆', W / 2, H / 2 - 20);
  ctx.fillStyle = '#fff';
  ctx.font = '24px Arial';
  ctx.fillText(`Арбуз покорил мир! Убито паразитов: ${totalKills}`, W / 2, H / 2 + 30);
  ctx.textAlign = 'left';
}

function drawDeadOverlay() {
  ctx.fillStyle = '#00000099';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ef5350';
  ctx.font = 'bold 46px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('💀 АРБУЗ СЪЕДЕН! 💀', W / 2, H / 2 - 20);
  ctx.fillStyle = '#fff';
  ctx.font = '22px Arial';
  ctx.fillText(`Паразиты победили. Убито: ${totalKills}`, W / 2, H / 2 + 30);
  ctx.textAlign = 'left';
}

// ── Utils ─────────────────────────────────────────────────────
function darken(hslStr, amount) {
  return hslStr.replace(/(\d+)%\)$/, (_, l) => `${Math.max(0, l - amount)}%)`);
}

// ── Game loop ─────────────────────────────────────────────────
function loop() {
