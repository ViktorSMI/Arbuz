<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Арбузилла 3D — Dark Souls of Watermelons</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;cursor:none}
canvas{display:block}
#blocker{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column}
#blocker h1{font-size:3.5rem;color:#4caf50;text-shadow:0 0 30px #4caf5066;margin-bottom:8px}
#blocker h2{font-size:1.1rem;color:#ef5350;margin-bottom:30px;font-weight:normal;letter-spacing:2px}
#blocker button{padding:16px 50px;font-size:1.2rem;font-weight:bold;border:none;border-radius:10px;cursor:pointer;color:#fff;letter-spacing:1px;background:linear-gradient(135deg,#4caf50,#2e7d32);transition:transform .15s}
#blocker button:hover{transform:scale(1.07)}
#blocker .sub{color:#999;font-size:.85rem;margin-top:14px}
#hud{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10;padding:16px}
.bar-wrap{width:280px;height:18px;background:#1a1a1a;border-radius:9px;border:2px solid #333;margin-bottom:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:7px;transition:width .2s}
.bar-label{position:absolute;top:0;left:8px;line-height:18px;font-size:11px;color:#fff;font-weight:bold;text-shadow:0 1px 2px #000}
#hp-bar .bar-fill{background:linear-gradient(90deg,#c62828,#ef5350)}
#stam-bar .bar-fill{background:linear-gradient(90deg,#1b5e20,#66bb6a)}
#crosshair{position:fixed;top:50%;left:50%;width:20px;height:20px;margin:-10px 0 0 -10px;z-index:11;pointer-events:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:#fff8}
#crosshair::before{width:2px;height:20px;left:9px;top:0}
#crosshair::after{width:20px;height:2px;left:0;top:9px}
#lock-info{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#aaa;font-size:1.2rem;z-index:100;pointer-events:none;display:none;text-align:center;text-shadow:0 1px 4px #000}
#enemy-hp{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;display:none;text-align:center}
#enemy-hp .bar-wrap{width:360px;margin:0 auto}
#enemy-hp .name{color:#fff;font-size:14px;margin-bottom:4px;text-shadow:0 1px 4px #000}
#death-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:100}
#death-screen h1{font-size:4rem;color:#c62828;text-shadow:0 0 40px #c6282866;margin-bottom:20px}
#death-screen button{padding:14px 40px;font-size:1.1rem;font-weight:bold;border:none;border-radius:10px;cursor:pointer;color:#fff;background:linear-gradient(135deg,#4caf50,#2e7d32)}
#minimap{position:fixed;bottom:16px;right:16px;width:160px;height:160px;border-radius:50%;border:2px solid #4caf50;overflow:hidden;z-index:10;pointer-events:none;background:#111a}
#xp-bar{position:fixed;top:52px;left:16px;z-index:10;pointer-events:none}
#xp-bar .bar-wrap{width:200px;height:12px}
#xp-bar .bar-fill{background:linear-gradient(90deg,#fdd835,#ff8f00)}
#xp-bar .bar-label{font-size:9px;line-height:12px}
#level-display{position:fixed;top:68px;left:16px;color:#fdd835;font-size:12px;font-weight:bold;z-index:10;pointer-events:none;text-shadow:0 1px 3px #000}
#kill-counter{position:fixed;top:84px;left:16px;color:#ef5350;font-size:12px;z-index:10;pointer-events:none;text-shadow:0 1px 3px #000}
#compass{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;color:#fff;font-size:13px;text-shadow:0 1px 4px #000;background:rgba(0,0,0,.4);padding:4px 16px;border-radius:20px}
#upgrade-panel{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column}
#upgrade-panel h2{color:#fdd835;font-size:2rem;margin-bottom:20px}
#upgrade-panel .upgr-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:500px}
#upgrade-panel .upgr-btn{padding:14px 20px;font-size:.95rem;border:none;border-radius:10px;cursor:pointer;color:#fff;background:linear-gradient(135deg,#4caf50,#2e7d32);min-width:140px;transition:transform .15s}
#upgrade-panel .upgr-btn:hover{transform:scale(1.05)}
#upgrade-panel .upgr-btn:disabled{opacity:.4;cursor:default;transform:none}
#boss-hp{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;display:none;text-align:center}
#boss-hp .bar-wrap{width:500px;height:22px;margin:0 auto}
#boss-hp .bar-fill{background:linear-gradient(90deg,#b71c1c,#ff1744)}
#boss-hp .name{color:#ff1744;font-size:18px;font-weight:bold;margin-bottom:6px;text-shadow:0 0 10px #ff174466}
#portal-prompt{position:fixed;bottom:200px;left:50%;transform:translateX(-50%);color:#4caf50;font-size:1.4rem;font-weight:bold;z-index:10;pointer-events:none;display:none;text-shadow:0 0 10px #4caf5066;animation:pulse-prompt 1.5s ease-in-out infinite}
@keyframes pulse-prompt{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<div id="blocker">
  <h1>🍉 АРБУЗИЛЛА 3D</h1>
  <h2>Dark Souls of Watermelons</h2>
  <button id="btn-play">Начать Завоевание</button>
  <div class="sub">Клик — захват курсора. WASD — движение. Мышь — камера. Shift — уворот. ЛКМ — удар. ESC — пауза.</div>
</div>
<div id="hud">
  <div id="hp-bar" class="bar-wrap"><div class="bar-fill" style="width:100%"></div><div class="bar-label">HP</div></div>
  <div id="stam-bar" class="bar-wrap"><div class="bar-fill" style="width:100%"></div><div class="bar-label">STAMINA</div></div>
</div>
<div id="crosshair"></div>
<div id="lock-info">Кликните для продолжения</div>
<div id="enemy-hp"><div class="name"></div><div class="bar-wrap"><div class="bar-fill" style="width:100%;background:linear-gradient(90deg,#c62828,#ef5350)"></div></div></div>
<div id="death-screen"><h1>ВЫ ПОГИБЛИ</h1><button id="btn-respawn">Возродиться</button></div>
<canvas id="minimap"></canvas>

<div id="xp-bar"><div class="bar-wrap"><div class="bar-fill" style="width:0%"></div><div class="bar-label">XP</div></div></div>
<div id="level-display">Ур. 1</div>
<div id="kill-counter">Убийств: 0 / 40</div>
<div id="compass">🍉 Исследуй мир</div>

<div id="upgrade-panel">
  <h2>🍉 УЛУЧШЕНИЕ</h2>
  <div class="upgr-grid">
    <button class="upgr-btn" data-stat="hp">❤️ Здоровье</button>
    <button class="upgr-btn" data-stat="damage">⚔️ Урон</button>
    <button class="upgr-btn" data-stat="stamina">💪 Стамина</button>
    <button class="upgr-btn" data-stat="speed">👟 Скорость</button>
  </div>
</div>

<div id="boss-hp"><div class="name"></div><div class="bar-wrap"><div class="bar-fill" style="width:100%"></div></div></div>

<div id="portal-prompt">[E] Перейти в следующую локацию</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module" src="js/main.js"></script>
</body>
</html>
